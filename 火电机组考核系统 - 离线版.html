        .short-input:focus { border-color: var(--primary); outline: none; }

        .score-num { font-size: 48px; font-weight: 700; }

        .stat-v { font-size: 24px; font-weight: 600; }
        .stat-l { font-size: 12px; opacity: 0.8; }

        .analysis h6 { color: #1565c0; margin: 0 0 8px 0; font-size: 13px; }
        .ext { background: #fff8e1; border-radius: 8px; padding: 12px; margin-top: 10px; border: 1px solid #ffe082; }
        .ext h6 { color: #f57c00; margin: 0 0 8px 0; font-size: 13px; }
        .progress-bar-custom { height: 6px; background: #e0e0e0; border-radius: 3px; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }

        const QUESTIONS = {"单选题": [{"type": "单选题", "id": 1, "chapter": "第一章", "page": "13", "question": "热工自动化主要包括自动检测、顺序控制、自动保护和什么？", "options": {"A": "自动报警", "B": "自动测量", "C": "自动控制", "D": "自动记录"}, "answer": "C", "analysis": "热工自动化主要包括自动检测、顺序控制、自动保护和自动控制。", "difficulty": "基础"}, {"type": "单选题", "id": 2, "chapter": "第一章", "page": "16", "question": "下面哪一种过渡过程是热工控制中比较理想的过渡过程？", "options": {"A": "发散振荡", "B": "等幅振荡", "C": "衰减振荡", "D": "非周期过程"}, "answer": "C", "analysis": "衰减振荡过程被控参数经过一段时间的振荡后，能很快地趋向于一个新的平衡状态，这种过渡过程是比较理想的。", "difficulty": "基础"}, {"type": "单选题", "id": 3, "chapter": "第一章", "page": "14", "question": "在汽包水位自动控制系统中，被控参数（被调量）是？", "options": {"A": "给水流量", "B": "蒸汽流量", "C": "汽包水位", "D": "给水压力"}, "answer": "C", "analysis": "按照生产过程的要求，应维持在预定变化范围内的工艺参数叫被控参数，在汽包水位自动控制系统中的汽包水位就是被控参数。", "difficulty": "基础"}, {"type": "单选题", "id": 7, "chapter": "第二章", "page": "21", "question": "控制对象受到阶跃扰动后，被调量不能依靠自身能力趋于某一稳定值的对象称为？", "options": {"A": "有自平衡能力对象", "B": "无自平衡能力对象", "C": "静态对象", "D": "动态对象"}, "answer": "B", "analysis": "无自平衡能力对象即对象在受到扰动后，其被调量不能依靠对象自身能力使之趋于某一稳定值。", "difficulty": "基础"}, {"type": "单选题", "id": 8, "chapter": "第二章", "page": "26", "question": "测定热工对象动态特性的“阶跃响应曲线法”中，利用得到的响应曲线通常用于求取对象的什么模型？", "options": {"A": "传递函数", "B": "状态空间方程", "C": "模糊逻辑规则", "D": "神经网络权值"}, "answer": "A", "analysis": "在时域内通过施加阶跃扰动并记录被调量的响应曲线，是工程上求取工业对象近似数学模型（通常为带有纯延迟的一阶或多阶惯性环节的传递函数）最常用的实验方法。", "difficulty": "基础"}, {"type": "单选题", "id": 9, "chapter": "第二章", "page": "19", "question": "过程控制系统中，描述被控过程动态特性的数学模型，通常是指过程的什么变量之间的数学关系？", "options": {"A": "内部状态与时间", "B": "输入与输出", "C": "扰动与设定值", "D": "稳态与瞬态"}, "answer": "B", "analysis": "过程特性的数学模型，本质上是描述被控对象在受到输入量（包括控制量和扰动量）作用下，其输出量随时间变化的动态关系的数学表达式。", "difficulty": "基础"}, {"type": "单选题", "id": 10, "chapter": "第二章", "page": "20", "question": "在阶跃扰动作用下，被调量不能依靠对象自身能力趋于新的稳定值，而是不断发散或积分变化的过程称为？", "options": {"A": "有自平衡能力过程", "B": "静态过程", "C": "无自平衡能力过程", "D": "纯滞后过程"}, "answer": "C", "analysis": "无自平衡能力过程在失去平衡后，由于内部没有能够阻止输出变化的反馈机制，被调量会沿着某一方向持续变化，不能依靠自身重建平衡。", "difficulty": "基础"}, {"type": "单选题", "id": 11, "chapter": "第二章", "page": "22", "question": "以下哪种方法属于求取被控过程动态特性的“实验测定法”？", "options": {"A": "阶跃响应法", "B": "能量守恒定律推导", "C": "物料平衡推导", "D": "热力学公式计算"}, "answer": "A", "analysis": "实验测定法是通过在实际对象上施加特定的试验扰动（如阶跃扰动）并记录输出响应曲线来求取模型，阶跃响应法是工程上最常用的实验测定法。", "difficulty": "基础"}, {"type": "单选题", "id": 12, "chapter": "第二章", "page": "29", "question": "建立过程数学模型的方法主要有实验测定法（系统辨识法）和什么方法两大类？", "options": {"A": "频率响应法", "B": "经验试凑法", "C": "阶跃分析法", "D": "机理分析法"}, "answer": "D", "analysis": "机理分析法是根据过程内在的物理、化学规律，通过推导和计算直接列出微分方程来建立对象数学模型的方法。", "difficulty": "中等"}, {"type": "单选题", "id": 13, "chapter": "第二章", "page": "21", "question": "在过程动态特性中，输入信号发生变化后，输出信号必须经过一段时间的停滞才开始发生变化，这段时间称为？", "options": {"A": "传递时间", "B": "纯迟延（纯滞后）", "C": "容量迟延", "D": "积分时间"}, "answer": "B", "analysis": "纯迟延（纯滞后）是由于物料或能量在传输管道或介质中输送需要耗费一定时间而引起的，期间输出量完全没有任何变化。", "difficulty": "中等"}, {"type": "单选题", "id": 14, "chapter": "第二章", "page": "21", "question": "过程产生“容量迟延”的根本原因通常是由于系统中存在什么因素？", "options": {"A": "测量误差", "B": "纯滞后管道", "C": "物料/能量的容量与传递阻力", "D": "调节阀卡涩"}, "answer": "C", "analysis": "容量迟延是因为系统内部存在存储物料或能量的“容量”，以及物质流动时遇到的“阻力”，使得充放过程需要时间。", "difficulty": "中等"}, {"type": "单选题", "id": 15, "chapter": "第二章", "page": "23", "question": "利用阶跃响应曲线求取对象传递函数时，该方法主要适用于测定哪一类过程的动态特性？", "options": {"A": "非线性时变过程", "B": "线性定常过程", "C": "随机振荡过程", "D": "混沌过程"}, "answer": "B", "analysis": "阶跃响应曲线等经典的实验测定法，其理论基础是线性系统的叠加原理，因此要求测试过程在工作点附近可视作线性定常系统。", "difficulty": "基础"}, {"type": "单选题", "id": 16, "chapter": "第二章", "page": "25", "question": "在工业控制中，最常见的一阶惯性加纯滞后过程模型 G(s)=Ke−τs/(Ts+1) 中，主要由哪三个特征参数构成？", "options": {"A": "放大系数K，积分时间Ti，微分时间Td", "B": "放大系数K，时间常数T，纯滞后时间τ", "C": "比例度δ，时间常数T，滞后时间τ"}, "answer": "B", "analysis": "K（静态放大系数）表征稳态属性，T（时间常数）表征动态响应速度，τ（纯滞后时间）表征信号传递的死区时间。", "difficulty": "中等"}, {"type": "单选题", "id": 17, "chapter": "第二章", "page": "26", "question": "过程的时间常数T越大，意味着该过程在受到扰动后输出量的响应速度？", "options": {"A": "越快", "B": "越慢", "C": "发生震荡", "D": "保持不变"}, "answer": "B", "analysis": "时间常数T代表了过程容量与阻力的乘积，T越大，表示物料或能量充放的惯性越大，系统对扰动的响应速度就越慢。", "difficulty": "基础"}, {"type": "单选题", "id": 18, "chapter": "第二章", "page": "25", "question": "对象的放大系数K在物理意义上表征了过程的什么特性？", "options": {"A": "动态响应快慢", "B": "信号传输延迟", "C": "稳态下的静态特性", "D": "系统抗干扰频率"}, "answer": "C", "analysis": "放大系数K反映了控制作用对被调量的最终稳态影响能力（输出量的变化量与输入量变化量之比），是静态特性的体现。", "difficulty": "中等"}, {"type": "单选题", "id": 19, "chapter": "第二章", "page": "30", "question": "在采用机理分析法建立热工或化工过程的数学模型时，最常依据的基本定律是？", "options": {"A": "牛顿运动定律", "B": "麦克斯韦方程组", "C": "物料平衡和能量平衡定律", "D": "基尔霍夫定律"}, "answer": "C", "analysis": "大部分热工及化工过程的本质是物质和能量的转化与传递，因此机理建模的核心就是针对控制容积列写物料质量守恒和热量/能量守恒方程。", "difficulty": "基础"}, {"type": "单选题", "id": 20, "chapter": "第二章", "page": "20", "question": "具有自平衡能力的过程，在受到阶跃输入扰动作用后，其输出响应曲线的最终趋势是？", "options": {"A": "等幅振荡", "B": "发散至无穷大", "C": "趋于并保持在一个新的稳定值", "D": "始终保持原值不变"}, "answer": "C", "analysis": "自平衡过程内部存在负反馈机制，当输入发生阶跃改变后，对象能依靠自身物理特性重建平衡，使得被调量稳定在一个新的静态工作点。", "difficulty": "中等"}, {"type": "单选题", "id": 21, "chapter": "第二章", "page": "28", "question": "在系统辨识和实验测定法中，除了阶跃信号外，工业现场测试还常采用哪种激励信号以减小对正常生产的干扰？", "options": {"A": "极高频正弦波", "B": "冲激函数", "C": "伪随机信号（M序列）或矩形脉冲", "D": "指数衰减信号"}, "answer": "C", "analysis": "阶跃扰动过大会影响生产安全。采用矩形脉冲或幅度较小的伪随机信号（M序列），可以在不严重破坏原工作点的情况下提取对象动态信息。", "difficulty": "中等"}, {"type": "单选题", "id": 22, "chapter": "第二章", "page": "22", "question": "过程的纯滞后时间τ对闭环控制系统的稳定性通常会产生什么不利影响？", "options": {"A": "增加相位裕度，提高稳定性", "B": "引入附加的相位滞后，显著降低系统的稳定性", "C": "使系统的固有频率增大", "D": "消除稳态误差"}, "answer": "B", "analysis": "纯滞后环节会产生与频率成正比的严重相位滞后 −ωτ，这极大侵蚀了系统的相位裕度，极易引起系统振荡甚至失稳。", "difficulty": "困难"}, {"type": "单选题", "id": 23, "chapter": "第二章", "page": "31", "question": "在通过机理方程推导过程的传递函数时，对方程进行拉普拉斯变换前，通常需要假设系统的初始条件为？", "options": {"A": "额定值", "B": "最大值", "C": "零初始条件", "D": "不确定值"}, "answer": "C", "analysis": "传递函数的严格数学定义是在零初始条件下，线性定常系统输出量的拉氏变换与输入量的拉氏变换之比。因此必须用增量形式列写方程并设初始增量为零。", "difficulty": "困难"}, {"type": "单选题", "id": 24, "chapter": "第二章", "page": "32", "question": "一个带有调节阀出水的单容水槽液位控制系统，其液位高度随进水阀门开度的动态变化特性，通常可近似建模为？", "options": {"A": "纯比例环节", "B": "理想微分环节", "C": "纯滞后环节", "D": "一阶惯性环节"}, "answer": "D", "analysis": "单容水槽具有一个储水容量和一个出水阻力，且阻力流量与液位成正比，其机理微分方程对应一阶惯性环节传递函数。", "difficulty": "中等"}, {"type": "单选题", "id": 25, "chapter": "第二章", "page": "34", "question": "相比于单容过程，多容过程（如两个水槽串联）的阶跃响应曲线在初始阶段具有什么显著特点？", "options": {"A": "立即以最大斜率上升", "B": "具有明显的“S型”容量迟延（初始斜率为零）", "C": "响应曲线呈直线上升", "D": "瞬间出现反向下冲"}, "answer": "B", "analysis": "多容过程由多个一阶惯性环节串联组成，阶跃输入由于需要逐级充填各容积，使得最终输出在初始时刻不仅幅值为0，其一阶导数也为0，表现出典型的S型迟延特性。", "difficulty": "困难"}, {"type": "单选题", "id": 26, "chapter": "第二章", "page": "24", "question": "在现场测定过程特性的阶跃响应曲线时，对施加的阶跃扰动幅度通常有一定要求，下列哪项要求是最合理的？", "options": {"A": "越大越好，以消除所有噪声", "B": "适中（通常为额定值的5%~15%），既能克服噪声又不使对象脱离线性区", "C": "越小越好，不干扰生产", "D": "必须是对象满量程的50%"}, "answer": "B", "analysis": "扰动太小则响应信号会被现场噪声淹没；扰动太大则可能触发对象的非线性特性或安全保护限制。因此要求幅度适中。", "difficulty": "困难"}, {"type": "单选题", "id": 27, "chapter": "第二章", "page": "23", "question": "实验测定法求取对象模型在工业中应用广泛，但以下哪一项不是实验测定法的优点？", "options": {"A": "不需要复杂的机理知识", "B": "直接反映对象的实际运行工况", "C": "能够深入揭示对象内部详细的物理、化学机理过程", "D": "测定方法相对简单实用"}, "answer": "C", "analysis": "实验测定法是一种“黑箱”或“灰箱”辨识方法，它只能得到外部等效数学模型，无法反映和揭示对象内部具体的物理及化学反应机制。", "difficulty": "困难"}, {"type": "单选题", "id": 28, "chapter": "第二章", "page": "27", "question": "在一阶惯性加纯滞后模型中，纯滞后τ和时间常数T的比值（τ/T）经常用来衡量过程的控制难度。该比值越大，表明对象？", "options": {"A": "越容易控制", "B": "越难控制，系统越容易振荡", "C": "稳态误差越小", "D": "控制器越不需要积分作用"}, "answer": "B", "analysis": "τ/T 越大，意味着系统在死区时间内累积的偏差越大，而对象的惯性又不能及时反映控制作用，控制难度剧增，常规PID很难获得良好品质。", "difficulty": "困难"}, {"type": "单选题", "id": 36, "chapter": "第三章", "page": "34", "question": "比例控制（P控制）的主要特点之一是？", "options": {"A": "无差控制", "B": "动作不及时", "C": "动作快，有差控制", "D": "能消除稳态偏差"}, "answer": "C", "analysis": "比例控制的特点之一是动作快，控制作用贯穿整个控制过程，但由于调节机构的位移与被调量的偏差有对应关系，所以控制的结果是被调量存在着静态偏差（有差控制）。", "difficulty": "中等"}, {"type": "单选题", "id": 37, "chapter": "第三章", "page": "35", "question": "积分控制（I控制）的主要作用是？", "options": {"A": "提高响应速度", "B": "消除静态偏差", "C": "减小动态偏差", "D": "产生超前控制"}, "answer": "B", "analysis": "只要有偏差存在，积分控制作用一直增加，直到偏差为零。因此积分控制消除了稳态偏差，实现无差控制。", "difficulty": "中等"}, {"type": "单选题", "id": 38, "chapter": "第三章", "page": "38", "question": "PID控制器中，哪种控制作用能够最早对扰动做出响应，具有“超前控制”的特点？", "options": {"A": "比例（P）作用", "B": "积分（I）作用", "D": "滤波作用"}, "answer": "C", "analysis": "微分作用是根据偏差的变化趋势（变化率）进行控制的，在偏差刚出现且还未显著增大时就能输出较大的控制信号，具有明显的超前控制效果。", "difficulty": "基础"}, {"type": "单选题", "id": 39, "chapter": "第三章", "page": "36", "question": "双位控制规律（ON-OFF控制）的调节器输出通常只有几种状态？", "options": {"A": "一种连续状态", "B": "两种极端的固定状态（如全开或全关）", "C": "三种状态", "D": "无数种状态"}, "answer": "B", "analysis": "双位调节器的输出信号只能取最大值（100%）或最小值（0%），不能连续平滑调节，执行机构对应的动作即为全开或全关。", "difficulty": "基础"}, {"type": "单选题", "id": 40, "chapter": "第三章", "page": "37", "question": "采用双位控制规律的闭环系统，在过渡过程中，被调量通常表现为哪种形式？", "options": {"A": "非周期单调衰减", "B": "迅速稳定在设定值无偏差", "C": "持续的等幅振荡", "D": "发散振荡"}, "answer": "C", "analysis": "由于双位控制不能根据偏差大小按比例输出，只要被调量跨越设定值，输出就立即发生极端翻转。加之对象自身存在迟延，必然导致被调量做持续的等幅振荡。", "difficulty": "中等"}, {"type": "单选题", "id": 41, "chapter": "第三章", "page": "38", "question": "纯比例（P）调节器的输出变化量与输入偏差之间成什么关系？", "options": {"A": "积分关系", "B": "微分关系", "C": "线性正比关系", "D": "指数关系"}, "answer": "C", "analysis": "比例调节器的数学表达式为 Δu=Kp​⋅e，即调节器的输出增量与输入偏差严格成线性正比关系。", "difficulty": "基础"}, {"type": "单选题", "id": 42, "chapter": "第三章", "page": "39", "question": "在比例控制中，比例度（或称比例带） δ 与调节器的放大系数 Kp​ 之间的关系是？", "options": {"A": "互为倒数关系（δ=1/Kp​）", "B": "正比关系", "C": "对数关系", "D": "无关"}, "answer": "A", "analysis": "比例度 δ 通常定义为调节器输出产生100%变化所需要的输入偏差百分比，它与放大倍数 Kp​ 互为倒数。δ 越小，放大倍数越大。", "difficulty": "中等"}, {"type": "单选题", "id": 43, "chapter": "第三章", "page": "40", "question": "比例控制规律应用于有自平衡能力的对象时，其控制结果存在的一个固有的原理性缺点是？", "options": {"A": "响应速度过慢", "B": "容易引起积分饱和", "C": "系统一定会失稳", "D": "存在不可消除的静态偏差（余差）"}, "answer": "D", "analysis": "比例控制器只有在存在偏差时才能维持一定的控制输出增量。当负荷改变需要新的稳态控制输出时，必然要有相应的稳态偏差存在，即有差调节。", "difficulty": "基础"}, {"type": "单选题", "id": 44, "chapter": "第三章", "page": "41", "question": "积分（I）调节器引入控制系统的主要作用（目的）是？", "options": {"A": "提高响应速度", "B": "消除系统的静态偏差（余差）", "C": "增加系统的阻尼", "D": "产生超前控制作用"}, "answer": "B", "analysis": "积分调节器的输出变化率与输入偏差成正比，只要偏差不为零，积分输出就会不断累积变化。只有当偏差为零时系统才平衡，从而实现无差控制。", "difficulty": "基础"}, {"type": "单选题", "id": 45, "chapter": "第三章", "page": "42", "question": "在积分控制规律中，积分时间常数 Ti​ 越小，表明积分控制作用？", "options": {"A": "越弱", "B": "越强，消除静差的速度越快", "C": "不变", "D": "使系统静态偏差增加"}, "answer": "B", "analysis": "积分作用强度的数学表达式含有系数 1/Ti​。因此 Ti​ 越小，单位时间内积分输出增加得越快，积分作用越强烈。", "difficulty": "中等"}, {"type": "单选题", "id": 46, "chapter": "第三章", "page": "43", "question": "相比于比例控制，单独使用积分调节器会使系统的动态稳定性？", "options": {"A": "显著变好", "B": "变差，更容易产生发散振荡", "C": "保持完全一致", "D": "提升系统的响应速度"}, "answer": "B", "analysis": "积分环节在频域上会产生 −90∘ 的相位滞后，严重消耗了系统的相位裕度。因此单独的纯积分控制极易导致系统振荡和失稳，工业上极少单用。", "difficulty": "中等"}, {"type": "单选题", "id": 47, "chapter": "第三章", "page": "44", "question": "比例积分（PI）调节器结合了P和I的优点，其稳态特性表现为？", "options": {"A": "快速动作，有差控制", "B": "无差控制", "C": "严重滞后的有差控制", "D": "只对高频信号有响应"}, "answer": "B", "analysis": "PI调节器初期依靠比例作用实现快速响应，后期依靠积分作用缓慢消除残余偏差。由于积分环节的存在，PI控制的稳态特性必然是无静差的。", "difficulty": "中等"}, {"type": "单选题", "id": 48, "chapter": "第三章", "page": "47", "question": "在比例微分（PD）调节规律中，微分作用是根据偏差的什么特征进行控制信号输出的？", "options": {"A": "偏差的累积总和", "B": "偏差的绝对大小", "C": "偏差的变化速度（变化率）", "D": "偏差的极性"}, "answer": "C", "analysis": "微分控制规律的方程为 u(t)=Td​⋅(de/dt)，即调节器的微分输出量直接与输入偏差随时间的变化率（导数）成正比。", "difficulty": "基础"}, {"type": "单选题", "id": 49, "chapter": "第三章", "page": "48", "question": "从时间响应的角度来看，微分（D）调节器具有什么样的显著控制特点？", "options": {"A": "消除静差", "B": "严重的滞后控制", "C": "具有预见性的“超前控制”", "D": "稳态保持不变"}, "answer": "C", "analysis": "微分作用能检测出偏差变化的趋势，在偏差刚出现且幅值很小、但有变大趋势时，就能输出较大的调节量，犹如“踩刹车”，起到超前控制效果。", "difficulty": "中等"}, {"type": "单选题", "id": 50, "chapter": "第三章", "page": "50", "question": "在比例积分微分（PID）三作用调节器中，主要用于减小系统动态最大偏差、加快过渡过程响应速度的是哪一部分作用？", "options": {"A": "比例作用", "B": "积分作用", "C": "微分作用", "D": "死区设置"}, "answer": "C", "analysis": "微分作用相当于在系统中增加了物理阻尼，通过对偏差变化率的早期干预，能有效减小超调量（最大动态偏差），加快系统恢复稳定的速度。", "difficulty": "中等"}, {"type": "单选题", "id": 51, "chapter": "第三章", "page": "49", "question": "在理想情况下，如果给理想微分调节器输入一个幅度为 A 的阶跃信号，其输出在理论上是一个什么信号？", "options": {"A": "缓慢上升的斜坡信号", "C": "冲激信号", "D": "正弦信号"}, "answer": "C", "analysis": "阶跃信号在 t=0 时刻的变化率为无穷大，因此理想微分器的输出理论上是一个幅值为无穷大、宽度为零的冲激脉冲信号。这也是纯微分不能实际应用的原因。", "difficulty": "困难"}, {"type": "单选题", "id": 52, "chapter": "第三章", "page": "49", "question": "实际工程和DCS控制系统中，为了防止高频测量噪声引起执行机构剧烈抖动，实际使用的微分调节器通常带有什么环节？", "options": {"A": "一阶惯性滤波环节（形成实际微分）", "B": "死区非线性环节", "C": "积分饱和限制环节", "D": "正反馈环节"}, "answer": "A", "analysis": "实际微分器通常在理想微分的传递函数分母中增加一个时间常数极小的一阶惯性滤波环节，以限制对高频噪声的极高增益，称为实际微分。", "difficulty": "困难"}, {"type": "单选题", "id": 53, "chapter": "第三章", "page": "39", "question": "在PID参数整定时，如果我们在控制器面板上将“比例度（δ）”数值减小，那么控制系统的比例作用将发生什么变化？", "options": {"A": "保持不变", "B": "减弱", "C": "增强", "D": "延迟"}, "answer": "C", "analysis": "比例度 δ 与控制增益 Kp​ 互为倒数。减小比例度，意味着放大系数增大，控制器对相同偏差输出的调节作用变得更猛烈（增强）。", "difficulty": "中等"}, {"type": "单选题", "id": 54, "chapter": "第三章", "page": "53", "question": "对于对象容量滞后较大、负荷变化剧烈且工艺要求完全无静态偏差的复杂温度控制过程，通常应选择哪种调节规律最合适？", "options": {"A": "纯比例（P）", "B": "比例积分（PI）"}, "answer": "D", "analysis": "滞后大且要求无静差，必须用I消除静差，但由于纯滞后大，PI控制极易振荡，必须引入微分（D）的超前阻尼作用来改善动态品质。故选PID。", "difficulty": "困难"}, {"type": "单选题", "id": 55, "chapter": "第三章", "page": "37", "question": "在双位控制系统中，为了避免由于测量噪声或极小波动导致继电器和阀门发生极高频的频繁开关磨损，通常在控制逻辑中会设置什么？", "options": {"A": "纯滞后延迟", "B": "中间缓冲区（死区或差动间隙）", "C": "比例放大环节", "D": "极点配置"}, "answer": "B", "analysis": "双位调节器通常采用具有滞回特性的继电器特性（带死区/差动间隙）。被调量必须偏离设定值达到临界点才会发生动作切换，大大降低了动作频率。", "difficulty": "中等"}, {"type": "单选题", "id": 56, "chapter": "第三章", "page": "55", "question": "观察某 PI 闭环控制系统的阶跃过渡过程曲线，发现曲线表现为周期越来越长、振幅越来越大的发散振荡，最可能的原因是调节器的哪个参数设置不当？", "options": {"A": "比例度过大", "B": "比例度过小和积分时间过短", "C": "微分时间设置过长", "D": "滤波时间太长"}, "answer": "B", "analysis": "发散振荡是系统极度不稳定的表现。比例度过小意味着比例放大倍数过大，加之积分时间过短（积分作用过强），导致系统超调失控发散。", "difficulty": "困难"}, {"type": "单选题", "id": 57, "chapter": "第三章", "page": "41", "question": "从时域数学表达式来看，积分（I）调节规律的输出 u(t) 与输入偏差 e(t) 随时间的什么特征成正比？", "options": {"A": "绝对幅值", "B": "一阶导数", "C": "随时间的积分面积（累积量）", "D": "对数特性"}, "answer": "C", "analysis": "积分控制的输出与偏差存在的时间历程所围成的面积（积分累积量）成正比。", "difficulty": "中等"}, {"type": "单选题", "id": 58, "chapter": "第三章", "page": "50", "question": "典型的比例积分微分（PID）调节方程中，表征微分作用强弱的系数 Td​ 称为？", "options": {"A": "微分时间常数", "B": "积分时间常数", "C": "导数增益", "D": "衰减时间"}, "answer": "A", "analysis": "Td​ 称为微分时间，其物理意义是当偏差斜坡增加时，单独比例作用输出达到当前微分作用输出所需的时间。Td​ 越大，超前调节作用越强。", "difficulty": "困难"}, {"type": "单选题", "id": 67, "chapter": "第四章", "page": "50", "question": "调节阀的“等百分比（对数）”流量特性的定义是？", "options": {"A": "流量与行程成正比", "B": "相对行程的等量变化引起相对流量的等百分比变化", "C": "小开度流量大，大开度流量小", "D": "流量随行程呈抛物线变化"}, "answer": "B", "analysis": "等百分比特性的调节阀，在同样行程变化下，大开度时流量变化量大，小开度时流量变化量小，但其相对流量的变化率（百分比）是恒定的，常用于补偿对象的非线性特性。", "difficulty": "基础"}, {"type": "单选题", "id": 68, "chapter": "第四章", "page": "45", "question": "热工自动控制系统中的执行器，通常由执行机构和什么两部分组成？", "options": {"A": "变送器", "B": "控制器", "C": "调节机构（如阀门）", "D": "放大器"}, "answer": "C", "analysis": "执行器是自动控制系统的终端元件，它由接受控制信号并产生推力的“执行机构”和直接改变操纵变量的“调节机构”（如调节阀）两部分组成。", "difficulty": "基础"}, {"type": "单选题", "id": 69, "chapter": "第四章", "page": "48", "question": "在气动执行机构中，安装“阀门定位器”的主要目的是什么？", "options": {"A": "改变阀门流量特性", "B": "克服阀杆摩擦力和不平衡力，实现准确定位", "C": "提高气源压力", "D": "实现气开气关转换"}, "answer": "B", "analysis": "阀门定位器与气动机构配套使用，形成闭环位置控制系统，主要用于克服填料摩擦力、流体不平衡力等，保证阀门开度严格按照控制信号准确定位。", "difficulty": "中等"}, {"type": "单选题", "id": 74, "chapter": "第五章", "page": "67", "question": "在串级控制系统中，起主导作用的回路称为？", "options": {"A": "副回路", "B": "主回路", "C": "干扰回路", "D": "测量回路"}, "answer": "B", "analysis": "在串级控制系统中，外面的闭合回路称为主回路，其被控参数为主参数，起主导作用。", "difficulty": "基础"}, {"type": "单选题", "id": 75, "chapter": "第五章", "page": "68", "question": "串级控制系统由于副回路的存在，对哪种干扰具有很强的克服能力？", "options": {"A": "一次干扰", "B": "二次干扰", "C": "所有外扰", "D": "给定值变化"}, "answer": "B", "analysis": "串级系统由于副回路的存在，提高了总放大倍数，因而对进入副回路的二次干扰具有较强的克服能力。", "difficulty": "中等"}, {"type": "单选题", "id": 76, "chapter": "第五章", "page": "73", "question": "在串级控制系统的设计中，副控制器的正/反作用方向取决于？", "options": {"A": "主控制器的作用方向", "B": "副对象和调节阀的特性", "C": "主对象的特性", "D": "干扰信号的位置"}, "answer": "B", "analysis": "副控制器与副对象、调节阀及变送器构成闭环副回路，副控制器作用方向必须保证副回路是负反馈闭环系统，故取决于副对象和调节阀的特性组合。", "difficulty": "中等"}, {"type": "单选题", "id": 77, "chapter": "第五章", "page": "66", "question": "下列哪种控制系统在硬件结构上通常包含两个测量变送器、两个控制器和一个调节阀？", "options": {"A": "单回路控制系统", "B": "串级控制系统", "C": "前馈控制系统", "D": "简单比值控制系统"}, "answer": "B", "analysis": "串级控制系统由主、副两个闭环嵌套而成，硬件上需要测量主、副两个参数的变送器以及两个控制器，但最终只驱动一个执行机构。", "difficulty": "中等"}, {"type": "单选题", "id": 78, "chapter": "第五章", "page": "75", "question": "在串级控制系统中，为了保证主被控参数能够实现无静差定值控制，主控制器通常选择哪种控制规律？", "options": {"A": "纯比例（P）", "D": "位式控制"}, "answer": "C", "analysis": "主回路的目标是精确维持主参数在给定值上，因此主控制器必须包含积分作用以消除稳态偏差，通常采用 PI 或 PID。", "difficulty": "困难"}, {"type": "单选题", "id": 81, "chapter": "第六章", "page": "78", "question": "能够在干扰出现时直接根据扰动大小和方向去控制，从而消除偏差的控制称为？", "options": {"A": "闭环控制", "B": "反馈控制", "C": "前馈控制", "D": "滞后控制"}, "answer": "C", "analysis": "当干扰出现时，控制器直接根据测得的扰动大小和方向按一定规律控制，补偿干扰对被调量的影响，称“前馈控制”或扰动补偿控制。", "difficulty": "中等"}, {"type": "单选题", "id": 82, "chapter": "第六章", "page": "78", "question": "纯粹的前馈控制系统，从结构上来看是一种按照什么进行补偿的开环控制系统？", "options": {"A": "测量偏差", "B": "扰动信号", "C": "设定值变化", "D": "输出反馈"}, "answer": "B", "analysis": "前馈控制不测量被调量的偏差，而是直接测量引起被调量变化的扰动信号，并根据扰动大小按开环方式进行补偿控制。", "difficulty": "中等"}, {"type": "单选题", "id": 86, "chapter": "第七章", "page": "83", "question": "在比值控制系统中，处于主导地位的物料流量称为？", "options": {"A": "主动量", "B": "从动量", "C": "偏差量", "D": "调节量"}, "answer": "A", "analysis": "在需要保持一定比例关系的两种物料中，处于主导地位的量称为主动量或主物料。", "difficulty": "基础"}, {"type": "单选题", "id": 87, "chapter": "第七章", "page": "86", "question": "在双闭环比值控制系统中，两路物料流量均设有闭环控制回路，其主要优点是？", "options": {"A": "结构最简单", "B": "能够保证总流量和流量比值均精确恒定", "C": "不需要控制器运算", "D": "只需测量一个流量"}, "answer": "B", "analysis": "双闭环比值控制能对主、从物料都进行定值闭环控制，从而保证总流量和两者的比值均精确符合工艺要求，比单闭环更稳定。", "difficulty": "中等"}, {"type": "单选题", "id": 88, "chapter": "第八章", "page": "95", "question": "在过热蒸汽温度控制系统中，通常作为主被控参数（主调量）的是？", "options": {"A": "减温水流量", "B": "过热器入口汽温", "C": "过热器出口汽温", "D": "炉膛温度"}, "answer": "C", "analysis": "过热蒸汽温度控制的主被控参数是过热器出口蒸汽温度，保证其在负荷变化和各种扰动下维持在规定范围内。", "difficulty": "基础"}, {"type": "单选题", "id": 89, "chapter": "第八章", "page": "96", "question": "大型火电机组中，过热蒸汽温度控制最主要、最灵敏的调节手段是？", "options": {"A": "烟气挡板调节", "B": "喷水减温", "C": "改变燃烧器倾角", "D": "烟气再循环"}, "answer": "B", "analysis": "在大型锅炉中，过热蒸汽温度控制最普遍且响应最迅速的手段是采用喷水减温器，通过改变减温水流量来直接调节汽温。", "difficulty": "基础"}, {"type": "单选题", "id": 90, "chapter": "第八章", "page": "97", "question": "过热器受热面长、金属质量大，这决定了过热汽温被控对象在动态特性上具有什么显著特点？", "options": {"A": "无纯迟延", "B": "具有极大的容量迟延和纯滞后", "C": "极快的响应速度", "D": "纯比例特性"}, "answer": "B", "analysis": "过热器管道极长且金属管壁较厚，使得蒸汽在其中的吸热和传输过程存在极大的热惯性（容量迟延）和纯滞后，这是汽温控制的主要难点。", "difficulty": "基础"}, {"type": "单选题", "id": 91, "chapter": "第八章", "page": "98", "question": "引起过热汽温变化的“蒸汽侧扰动”主要指的是？", "options": {"A": "燃料量变化", "B": "送风量变化", "C": "给水压力变化", "D": "蒸汽负荷（蒸汽流量）变化"}, "answer": "D", "analysis": "蒸汽侧扰动主要指机组负荷改变引起的蒸汽流量变化，它直接改变了工质流速和吸热量，从而导致过热汽温发生波动。", "difficulty": "基础"}, {"type": "单选题", "id": 92, "chapter": "第八章", "page": "100", "question": "在锅炉过热汽温控制系统中，喷水减温器一般布置在过热器的哪个位置控制效果最好且最常见？", "options": {"A": "过热器入口", "B": "过热器各级之间（级间）", "C": "过热器出口端", "D": "汽轮机入口"}, "answer": "B", "analysis": "减温器通常布置在两级过热器之间（级间布置）。既能保护后一级管壁不超温，又避免水滴直接进入汽轮机引发水击，兼顾控制灵敏度和安全性。", "difficulty": "基础"}, {"type": "单选题", "id": 93, "chapter": "第八章", "page": "102", "question": "在机组正常变负荷运行过程中，过热蒸汽温度控制系统的设定值通常要求？", "options": {"A": "保持额定值恒定不变", "B": "随负荷成正比例上升", "C": "随负荷成反比例下降", "D": "在高负荷时降低，低负荷时升高"}, "answer": "A", "analysis": "无论机组负荷如何变化，为了保证汽轮机的绝对安全和极高的热效率，主蒸汽温度的设定值必须始终严格保持在铭牌规定的额定高温状态。", "difficulty": "基础"}, {"type": "单选题", "id": 94, "chapter": "第八章", "page": "102", "question": "大型火电机组主蒸汽温度控制主要采用的方法是？", "options": {"A": "改变烟气挡板", "B": "喷水减温", "C": "改变燃烧器倾角", "D": "调整送风量"}, "answer": "B", "analysis": "主蒸汽（过热蒸汽）温度控制最普遍且最灵敏的手段是采用喷水减温器，通过改变减温水流量来调节汽温。", "difficulty": "中等"}, {"type": "单选题", "id": 95, "chapter": "第八章", "page": "102", "question": "在典型的过热汽温串级控制系统中，主被控参数（主回路的反馈量）是？", "options": {"A": "减温水流量", "B": "减温器出口汽温", "C": "过热器出口主蒸汽温度", "D": "炉膛燃烧温度"}, "answer": "C", "analysis": "串级控制系统的主回路负责保证最终工艺指标的精度，因此主被控参数是最终的过热器出口主蒸汽温度。", "difficulty": "中等"}, {"type": "单选题", "id": 96, "chapter": "第八章", "page": "103", "question": "在过热汽温串级控制系统中，副被控参数（导前汽温）通常选择的是？", "options": {"A": "减温器出口（或过热器中间某点）汽温", "B": "过热器出口汽温", "C": "汽包出口饱和汽温", "D": "高压缸排汽温度"}, "answer": "A", "analysis": "副被控参数通常选择减温器后、过热器中间某一点的蒸汽温度，该点温度能够比出口汽温更早地反映减温水量或烟气侧的扰动，起到超前（导前）控制作用。", "difficulty": "中等"}, {"type": "单选题", "id": 97, "chapter": "第八章", "page": "104", "question": "在过热汽温控制中引入导前汽温微分信号，其主要目的是为了克服对象的什么不利特性？", "options": {"A": "巨大的热惯性和纯滞后", "B": "系统的非线性", "C": "控制器的积分饱和", "D": "执行机构的死区"}, "answer": "A", "analysis": "导前汽温位于减温器之后，对减温水量的响应极快。引入其微分信号可以极早发现温度变化趋势，令控制器提前动作，从而有效克服极大迟延。", "difficulty": "中等"}, {"type": "单选题", "id": 98, "chapter": "第八章", "page": "105", "question": "在标准的过热汽温串级控制系统中，主控制器的控制规律一般设计为？", "options": {"A": "纯比例（P）", "B": "双位控制"}, "answer": "C", "analysis": "主回路的目的是维持过热器出口汽温等于设定值，实现无静差定值控制。因此主控制器必须包含积分作用，通常采用 PI 或 PID。", "difficulty": "中等"}, {"type": "单选题", "id": 99, "chapter": "第八章", "page": "105", "question": "在标准的过热汽温串级控制系统中，副控制器的控制规律一般设计为？", "options": {"A": "纯积分（I）", "B": "纯比例（P）或比例积分（PI）", "D": "双位控制"}, "answer": "B", "analysis": "副回路的主要任务是快速消除进入副环的扰动，允许有一定的静差，因此副控制器为了追求极快的响应速度，通常采用纯 P 或弱积分的 PI。", "difficulty": "中等"}, {"type": "单选题", "id": 100, "chapter": "第八章", "page": "106", "question": "现代大型机组常布置两级（或多级）喷水减温器。通常情况下，一级减温和二级（末级）减温在控制策略上的分工是？", "options": {"A": "一级用于细调，二级用于粗调", "B": "一级用于粗调，保护中间受热面；二级用于细调，保证最终汽温精度", "C": "两级完全并行等量控制", "D": "一级仅在紧急停机时使用"}, "answer": "B", "analysis": "一级减温器靠近入口段，吸收大部分热量偏差（粗调）并保护后续管排；末级减温器靠近出口段，热惯性较小，专门用于精确控制主汽温（细调）。", "difficulty": "中等"}, {"type": "单选题", "id": 101, "chapter": "第八章", "page": "107", "question": "为了补偿减温对象在不同负荷下放大系数非线性的变化，喷水减温调节阀通常希望选用什么样的流量特性？", "options": {"A": "快开特性", "B": "线性特性", "C": "等百分比（对数）特性", "D": "抛物线特性"}, "answer": "C", "analysis": "锅炉负荷越低，减温水的调节灵敏度越高。选用等百分比阀门可以很好地补偿这一非线性，使广义对象总增益基本保持不变。", "difficulty": "中等"}, {"type": "单选题", "id": 102, "chapter": "第八章", "page": "108", "question": "在主蒸汽温度串级控制系统中，引入导前微分信号的主要目的是？", "options": {"A": "消除静态偏差", "B": "克服对象的巨大容量迟延", "C": "提高系统的频率", "D": "减少执行机构的磨损"}, "answer": "B", "analysis": "过热器管道长，主汽温响应极慢。引入导前区温度的微分信号，能够极早感知温度变化的趋势，令控制器提前动作，有效克服大迟延。", "difficulty": "中等"}, {"type": "单选题", "id": 103, "chapter": "第八章", "page": "111", "question": "再热汽温控制最常用的主要（日常）调节手段通常是？", "options": {"A": "烟气挡板调节（改变烟气流量分配）", "B": "大量喷入减温水", "C": "改变给水温度", "D": "改变汽包水位"}, "answer": "A", "analysis": "现代锅炉通常分为双烟道，通过调节布置在低温过热器和再热器侧的烟气挡板开度，改变流经再热器的烟气量，是控制再热汽温最常用的手段。", "difficulty": "中等"}, {"type": "单选题", "id": 104, "chapter": "第八章", "page": "98", "question": "运行中如果给水温度突然降低，为了维持相同负荷，燃料量将增加，此时过热汽温最终的稳态变化趋势是？", "options": {"A": "显著升高", "B": "显著降低", "C": "不受任何影响", "D": "发生周期性衰减振荡"}, "answer": "A", "analysis": "给水温度降低，锅炉蒸发区段吸热比例增加，维持蒸发量必须增加总燃料量。燃料增加导致整个炉膛温度与烟气量上升，过热器吸热量过剩，汽温显著升高。", "difficulty": "困难"}, {"type": "单选题", "id": 105, "chapter": "第八章", "page": "99", "question": "纯辐射式过热器的汽温特性是：当锅炉负荷（蒸汽流量）增加时，其出口汽温将？", "options": {"A": "降低", "B": "升高", "C": "保持不变", "D": "剧烈振荡"}, "answer": "A", "analysis": "负荷增加时，辐射传热量增加比例较小，但流过的蒸汽流量大幅增加，导致单位质量蒸汽吸热量减少，汽温降低。", "difficulty": "困难"}, {"type": "单选题", "id": 106, "chapter": "第八章", "page": "99", "question": "纯对流式过热器的汽温特性是：当锅炉负荷（蒸汽流量）增加时，其出口汽温将？", "options": {"A": "降低", "B": "升高", "C": "保持恒定", "D": "归零"}, "answer": "B", "analysis": "负荷增加导致燃料量增加，烟气流速和烟温显著提高，其传热量的增加比例超过了蒸汽流量的增加比例，故汽温升高。", "difficulty": "困难"}, {"type": "单选题", "id": 107, "chapter": "第八章", "page": "108", "question": "导前汽温微分信号在过热汽温控制系统中的作用，类似于常规PID控制器中的哪种控制作用？", "options": {"A": "比例（P）作用", "B": "积分（I）作用", "D": "纯滞后作用"}, "answer": "C", "analysis": "引入导前汽温变化率，能在偏差大量反映到主汽温前使控制器提前动作。这与PID中微分作用“根据变化趋势超前控制”机理一致，克服热惯性。", "difficulty": "困难"}, {"type": "单选题", "id": 108, "chapter": "第八章", "page": "108", "question": "汽温控制中，如果采用“微分先行”的PID控制结构，其主要优点是？", "options": {"A": "完全消除静差", "B": "避免设定值发生阶跃改变时产生巨大的“微分冲击”", "C": "缩短反馈信号的延迟", "D": "减少变送器"}, "answer": "B", "analysis": "微分先行将D置于反馈通道，只对实际测量的温度变化敏感，从而避免了运行人员突改设定值时产生的阶跃误差导致微分项瞬间输出无穷大的冲击。", "difficulty": "困难"}, {"type": "单选题", "id": 109, "chapter": "第八章", "page": "110", "question": "为什么现代大型锅炉的再热汽温控制，通常不采用喷水减温作为主要调节手段？", "options": {"A": "会显著降低机组的循环热效率（热经济性）", "B": "喷水减温响应太慢", "C": "无法控制再热蒸汽压力", "D": "减温水量不足"}, "answer": "A", "analysis": "再热器处喷水相当于增加了低品位蒸汽做功，会严重降低整个热力循环的热效率。因此再热汽温主要靠烟气侧调节，喷水仅作事故保护。", "difficulty": "困难"}, {"type": "单选题", "id": 110, "chapter": "第八章", "page": "112", "question": "采用改变燃烧器倾角（摆角）来调节汽温时，当燃烧器倾角向下摆动时，炉膛出口烟温和过热/再热汽温通常会如何变化？", "options": {"A": "升高", "B": "降低", "C": "保持不变", "D": "先升后降"}, "answer": "B", "analysis": "倾角向下摆动会降低炉膛火焰中心，使得水冷壁吸收更多热量，导致炉膛出口烟温降低，进而使布置在对流烟道中的过热/再热汽温降低。", "difficulty": "困难"}, {"type": "单选题", "id": 111, "chapter": "第八章", "page": "113", "question": "烟气再循环控制汽温的原理是：从引风机后抽取部分低温烟气送入炉膛，这将主要改变炉内的什么条件？", "options": {"A": "增加总发热量", "B": "降低烟气流速", "C": "改变炉膛辐射传热量与尾部对流传热量的比例", "D": "提高燃烧效率"}, "answer": "C", "analysis": "送入低温再循环烟气会降低炉膛温度，减少水冷壁辐射吸热；同时增加了流经尾部烟道的总烟气流速，强化了对流过热器和再热器的传热，从而提高汽温。", "difficulty": "困难"}, {"type": "单选题", "id": 119, "chapter": "第九章", "page": "115", "question": "汽包锅炉给水自动控制系统的主要任务是维持什么参数在安全范围内？", "options": {"A": "主蒸汽压力", "B": "汽包水位", "C": "给水压力", "D": "炉膛负压"}, "answer": "B", "analysis": "汽包锅炉给水控制的主要任务是使给水量适应锅炉蒸发量，维持汽包水位在允许的安全范围内，防止满水或缺水事故。", "difficulty": "基础"}, {"type": "单选题", "id": 120, "chapter": "第九章", "page": "115", "question": "汽包锅炉给水自动控制系统的主要被控参数是？", "options": {"A": "给水压力", "B": "汽包水位", "C": "主蒸汽流量", "D": "给水温度"}, "answer": "B", "analysis": "给水控制系统的核心任务就是通过调节给水量来维持锅炉的汽包水位，水位就是被控参数。", "difficulty": "基础"}, {"type": "单选题", "id": 121, "chapter": "第九章", "page": "115", "question": "锅炉给水控制的主要任务是使给水量时刻适应锅炉的什么量？", "options": {"A": "燃料量", "B": "排污量", "C": "蒸发量", "D": "送风量"}, "answer": "C", "analysis": "维持汽包水位稳定的根本前提，是保持输入锅炉的给水质量流量与输出的蒸汽质量流量（蒸发量）时刻保持平衡相适应。", "difficulty": "基础"}, {"type": "单选题", "id": 122, "chapter": "第九章", "page": "116", "question": "如果锅炉汽包水位过高（满水），可能会导致什么严重后果？", "options": {"A": "炉膛爆炸", "B": "蒸汽带水，导致过热器结垢并可能损坏汽轮机叶片", "C": "破坏水循环", "D": "烧坏水冷壁管"}, "answer": "B", "analysis": "水位过高会破坏汽水分离装置的正常工作，导致蒸汽携带大量水分盐分，重则水滴进入汽轮机打坏叶片（水击）。", "difficulty": "基础"}, {"type": "单选题", "id": 123, "chapter": "第九章", "page": "116", "question": "如果锅炉汽包水位过低（缺水），可能会导致什么严重后果？", "options": {"A": "蒸汽带水", "B": "汽轮机水击", "C": "破坏锅炉水循环，导致水冷壁管干烧爆管", "D": "降低主汽压力"}, "answer": "C", "analysis": "水位过低会使下降管带汽，破坏锅炉内部的自然水循环，导致水冷壁管得不到充足冷却而过热、爆管，极其危险。", "difficulty": "基础"}, {"type": "单选题", "id": 124, "chapter": "第九章", "page": "118", "question": "当锅炉蒸汽流量突然增加时，汽压下降导致炉水大面积汽化，水位短时间内不降反升的现象称为？", "options": {"A": "沸腾水位", "B": "虚假水位", "C": "膨胀水位", "D": "极限水位"}, "answer": "B", "analysis": "因压力急剧变化导致汽水混合物比容瞬间改变，表现出与实际水量增减相反的暂时性水位变化现象，称为“虚假水位”。", "difficulty": "基础"}, {"type": "单选题", "id": 125, "chapter": "第九章", "page": "120", "question": "单冲量给水控制系统作为最简单的液位控制，通常只引入哪一个测量信号？", "options": {"A": "蒸汽流量", "B": "给水流量", "C": "汽包水位", "D": "给水压力"}, "answer": "C", "analysis": "单冲量控制系统只有一个测量信号输入给控制器，即直接反映控制目标的反馈信号——汽包水位。", "difficulty": "基础"}, {"type": "单选题", "id": 126, "chapter": "第九章", "page": "124", "question": "现代大型火电机组普遍采用的“三冲量”给水控制系统，其引入的三个冲量分别是汽包水位、蒸汽流量和？", "options": {"A": "主蒸汽压力", "B": "给水流量", "C": "给水温度", "D": "炉膛负压"}, "answer": "B", "analysis": "三冲量系统综合了汽包水位（主反馈）、蒸汽流量（前馈）和给水流量（副反馈）三个信号进行联合控制。", "difficulty": "基础"}, {"type": "单选题", "id": 127, "chapter": "第九章", "page": "117", "question": "在引起汽包水位发生动态变化的诸多扰动中，最复杂且对控制影响最大的扰动是？", "options": {"A": "给水流量扰动", "B": "蒸汽负荷（蒸汽流量）扰动", "C": "燃料量（燃烧发热量）扰动", "D": "环境温度变化"}, "answer": "B", "analysis": "蒸汽流量扰动不仅改变物料平衡，还会因瞬间改变汽包压力而引发极具误导性的“虚假水位”现象，是对控制系统最严峻的考验。", "difficulty": "中等"}, {"type": "单选题", "id": 128, "chapter": "第九章", "page": "118", "question": "“虚假水位”现象主要是由于锅炉内哪一个物理量的急剧变化引起的？", "options": {"A": "汽包内工质压力", "B": "给水温度", "C": "给水压力", "D": "燃料发热量"}, "answer": "A", "analysis": "蒸汽负荷突变首先引起汽包内部压力突变，进而改变炉水饱和温度使其发生附加汽化，水面下汽泡容积突变导致虚假水位。", "difficulty": "中等"}, {"type": "单选题", "id": 129, "chapter": "第九章", "page": "121", "question": "单冲量给水控制系统在实际应用中最致命的缺点是？", "options": {"A": "结构过于复杂", "B": "无法克服“虚假水位”引起的调节阀严重误动作", "C": "不能消除稳态误差", "D": "响应太快"}, "answer": "B", "analysis": "当产生虚假水位（假性上升）时，单冲量控制器会误以为水满而关小给水阀，与实际需增加水量的方向相反，极易导致严重缺水。", "difficulty": "中等"}, {"type": "单选题", "id": 130, "chapter": "第九章", "page": "122", "question": "双冲量给水控制系统在单冲量（汽包水位）的基础上，增加引入了什么信号作为前馈补偿？", "options": {"A": "给水压力", "B": "燃料量", "C": "给水流量", "D": "蒸汽流量"}, "answer": "D", "analysis": "双冲量系统引入蒸汽流量作为前馈。蒸汽流量突变时，前馈通道能直接操纵阀门同向动作，抵消虚假水位的误导。", "difficulty": "中等"}, {"type": "单选题", "id": 131, "chapter": "第九章", "page": "124", "question": "在典型的三冲量给水控制系统中，给水流量信号的主要作用是作为？", "options": {"A": "主反馈信号", "B": "前馈信号", "C": "副环反馈信号，快速消除给水侧扰动", "D": "设定值"}, "answer": "C", "analysis": "给水流量与调节阀构成快速副闭环。给水泵压力波动等内部扰动能在副环内被瞬间察觉并消除，根本不会波及汽包水位。", "difficulty": "中等"}, {"type": "单选题", "id": 132, "chapter": "第九章", "page": "125", "question": "在串级结构的三冲量给水控制系统中，主调节器（水位调节器）通常采用的控制规律是？", "options": {"A": "纯 P", "B": "双位控制"}, "answer": "C", "analysis": "主回路负责保证汽包水位最终精确稳定在设定值上，实现无静差控制，因此主调节器必须带有积分作用（PI 或 PID）。", "difficulty": "中等"}, {"type": "单选题", "id": 133, "chapter": "第九章", "page": "125", "question": "在串级结构的三冲量给水控制系统中，副调节器（给水流量调节器）通常采用的控制规律是？", "options": {"A": "纯 P 或弱 PI", "B": "纯 I", "C": "强 I", "D": "双位控制"}, "answer": "A", "analysis": "副回路作用是快速动作消除内部扰动并跟随主令，为追求极快响应速度并避免振荡，通常采用纯 P 或弱积分的 PI。", "difficulty": "中等"}, {"type": "单选题", "id": 134, "chapter": "第九章", "page": "126", "question": "给水自动控制系统中，单冲量控制系统通常适用在什么运行工况下？", "options": {"A": "机组满负荷", "B": "机组启动初期或极低负荷", "C": "频率波动大", "D": "压力下降"}, "answer": "B", "analysis": "启动初期或极低负荷（<30%）时，蒸汽流量极小测不准，且虚假水位不明显，此时适合并通常只能采用单冲量控制。", "difficulty": "中等"}, {"type": "单选题", "id": 135, "chapter": "第九章", "page": "130", "question": "现代大型机组为了节能降耗，锅炉给水通常采用变频调速给水泵，相比于调节阀节流调节，其主要优势是？", "options": {"A": "响应远快于调节阀", "B": "彻底消除虚假水位", "C": "大幅减少节流损失，降低耗电量", "D": "简化逻辑"}, "answer": "C", "analysis": "采用转速调节改变泵扬程曲线直接适应管路阻力，消除了调节阀节流带来的巨大压差损失，经济效益极其显著。", "difficulty": "中等"}, {"type": "单选题", "id": 136, "chapter": "第九章", "page": "120", "question": "在大型锅炉给水控制中，常采用的“三冲量”控制系统是指哪三个测量信号？", "options": {"A": "水位、汽压、水压", "B": "汽包水位、蒸汽流量、给水流量", "C": "水位、燃料、流量", "D": "汽压、汽温、流量"}, "answer": "B", "analysis": "引入汽包水位（主冲量）、蒸汽流量（前馈）和给水流量（副反馈），能有效克服“虚假水位”和给水压力扰动。", "difficulty": "困难"}, {"type": "单选题", "id": 137, "chapter": "第九章", "page": "123", "question": "虽然双冲量系统能克服虚假水位，但它存在一个严重的结构性缺陷，即无法有效克服哪种扰动？", "options": {"A": "蒸汽负荷扰动", "B": "热负荷扰动", "C": "给水侧（如给水压力或给水泵波动）的内部扰动", "D": "环境扰动"}, "answer": "C", "analysis": "双冲量系统无给水流量反馈。若给水母管压力波动导致实际给水量改变，系统只能等水位发生明显偏差后才反应，存在严重滞后。", "difficulty": "困难"}, {"type": "单选题", "id": 138, "chapter": "第九章", "page": "124", "question": "当锅炉负荷突增引起“虚假水位”时，三冲量系统中的前馈和主反馈会产生相反指令。此时系统能正确开大给水阀，主要是由于谁占优？", "options": {"A": "水位主反馈关阀占优", "B": "蒸汽流量前馈的开阀作用占优（系数匹配得当）", "C": "给水流量占优", "D": "自动切断反馈"}, "answer": "B", "analysis": "参数整定正确时，蒸汽流量增加产生的前馈“开大”信号强度，会超过虚假水位上升带来的反馈“关小”信号强度，保证系统正确同向动作。", "difficulty": "困难"}, {"type": "单选题", "id": 139, "chapter": "第九章", "page": "128", "question": "在“给水全程自动控制系统”中，随着机组负荷从点火逐渐上升到满负荷，给水执行机构通常会经历怎样的切换过程？", "options": {"A": "始终靠泵控制", "B": "旁路小阀 -> 主给水大阀 -> 给水泵转速调节", "C": "主阀 -> 旁路阀", "D": "不切换"}, "answer": "C", "analysis": "启动初期用旁路小阀控制（保证小流量线性）；负荷上升后小阀满载，平滑切换至主给水大阀；高负荷下切换为泵转速控制以节能。", "difficulty": "困难"}, {"type": "单选题", "id": 140, "chapter": "第九章", "page": "129", "question": "给水全程控制系统在低负荷阶段（<30%）和正常高负荷阶段，通常分别采用哪种控制策略？", "options": {"A": "低负荷三冲量，高负荷单冲量", "B": "始终三冲量", "C": "低负荷单冲量，高负荷平滑切换至三冲量", "D": "始终单冲量"}, "answer": "C", "analysis": "低负荷时蒸汽流量测不准且虚假水位不明显，单冲量更稳定；负荷升高流量测量准确且虚假水位扰动变强，系统无扰切换为三冲量。", "difficulty": "困难"}, {"type": "单选题", "id": 151, "chapter": "第十章", "page": "140", "question": "锅炉燃烧自动控制系统的首要任务是适应机组负荷需求，并维持什么参数的稳定？", "options": {"A": "汽包水位", "B": "主蒸汽压力", "C": "过热汽温", "D": "给水压力"}, "answer": "B", "analysis": "燃烧系统最基本的功能就是提供与外界负荷相匹配的热量，通过调节燃料量来恢复并维持主蒸汽压力的稳定。", "difficulty": "基础"}, {"type": "单选题", "id": 152, "chapter": "第十章", "page": "142", "question": "典型的锅炉燃烧自动控制系统通常由哪三个相互关联的子系统组成？", "options": {"A": "给水、汽温、旁路", "B": "燃料量、送风量、引风量", "C": "一次风、二次风、三次风", "D": "给煤、给粉、排渣"}, "answer": "B", "analysis": "燃烧控制系统包含控制汽压的燃料量、控制经济燃烧的送风量，以及控制炉膛安全的引风量三个子系统。", "difficulty": "基础"}, {"type": "单选题", "id": 153, "chapter": "第十章", "page": "143", "question": "锅炉送风控制系统的主要控制任务是维持炉膛内的什么参数在最佳状态？", "options": {"A": "炉膛负压", "B": "烟气含氧量（风煤比）", "C": "一次风压", "D": "排烟温度"}, "answer": "B", "analysis": "送风系统的目的是提供匹配的空气量，保证经济燃烧，通常以维持烟气中最佳含氧量（风煤比）为目标。", "difficulty": "基础"}, {"type": "单选题", "id": 154, "chapter": "第十章", "page": "150", "question": "在锅炉燃烧控制系统中，送风机静叶或转速的改变，最主要和最直接影响的监控参数是？", "options": {"A": "炉膛负压", "B": "烟气含氧量", "C": "主蒸汽压力", "D": "汽包水位"}, "answer": "B", "analysis": "送风机负责向炉膛提供燃烧所需空气，其送风量的改变直接决定了风煤配比，最直接的监测反映指标就是烟气含氧量。", "difficulty": "基础"}, {"type": "单选题", "id": 155, "chapter": "第十章", "page": "144", "question": "引风自动控制系统的主要控制目标是？", "options": {"A": "提高锅炉热效率", "B": "维持炉膛处于微负压状态", "C": "增加进入炉膛空气量", "D": "调节燃料量"}, "answer": "B", "analysis": "引风机负责抽出烟气，维持炉膛微负压既能防止火焰和高温烟气外喷伤人，又能避免漏风过多降低热效率。", "difficulty": "基础"}, {"type": "单选题", "id": 156, "chapter": "第十章", "page": "142", "question": "锅炉燃烧系统中的“一次风”通常指的是什么风？", "options": {"A": "冷却炉墙风", "B": "用于携带并输送煤粉进入燃烧器的风", "C": "提供全部燃烧氧气", "D": "吹灰空气"}, "answer": "B", "analysis": "一次风的主要作用是干燥煤粉，并作为载体将煤粉输送、喷射进入炉膛燃烧；二次风则提供大部分氧气并加强扰动。", "difficulty": "基础"}, {"type": "单选题", "id": 157, "chapter": "第十章", "page": "145", "question": "在控制风煤比时，作为反馈用来表征实际过剩空气系数的测量仪表通常是安装在锅炉尾部的什么设备？", "options": {"A": "温度热电偶", "B": "氧化锆氧量分析仪", "C": "压力变送器", "D": "皮托管风速计"}, "answer": "B", "analysis": "工业上通常利用安装在省煤器出口等处的“氧化锆氧量分析仪”来在线测量烟气中的含氧量，作为送风控制的校正反馈。", "difficulty": "基础"}, {"type": "单选题", "id": 158, "chapter": "第十章", "page": "153", "question": "在引风控制系统中，为了维持炉膛负压的稳定，执行机构通常是调节？", "options": {"A": "送风机动叶", "B": "给煤机转速", "C": "引风机静叶或转速", "D": "一次风挡板"}, "answer": "C", "analysis": "引风控制系统通过改变引风机的出力（调节引风机挡板、静叶或变频转速）来改变抽气量，维持负压平衡。", "difficulty": "基础"}, {"type": "单选题", "id": 159, "chapter": "第十章", "page": "146", "question": "采用直吹式制粉系统的煤粉锅炉，其燃料控制对象在动态特性上最显著的不利特点是？", "options": {"A": "响应速度极快", "B": "存在巨大的纯迟延和容量迟延", "C": "呈纯积分特性", "D": "毫无惯性"}, "answer": "B", "analysis": "直吹式系统无粉仓，煤需经碾磨、干燥再长距离吹送到炉膛。这导致燃料量调节存在巨大的纯滞后和惯性迟延。", "difficulty": "中等"}, {"type": "单选题", "id": 160, "chapter": "第十章", "page": "147", "question": "相比于直吹式制粉系统，“中间储仓式”制粉系统的燃料控制主要调节哪个设备？其响应速度如何？", "options": {"A": "给煤机，极慢", "B": "给粉机，响应较快", "C": "磨煤机，较快", "D": "排粉机，极慢"}, "answer": "B", "analysis": "储仓式控制直接调节粉仓下方的“给粉机”转速，煤粉立即进入炉膛，因此其响应速度远快于调节给煤机的直吹式。", "difficulty": "中等"}, {"type": "单选题", "id": 161, "chapter": "第十章", "page": "150", "question": "当机组需要增加负荷时，风煤“交叉限幅”逻辑的动作顺序是？", "options": {"A": "先加煤，后加风", "B": "先加风，后加煤", "C": "风煤同时等量增加", "D": "风煤同时等量减少"}, "answer": "B", "analysis": "增加负荷时，必须先增加送风量，待实际风量上升后，再允许燃料量增加。这保证了富氧燃烧，防止不完全燃烧和爆燃危险。", "difficulty": "中等"}, {"type": "单选题", "id": 162, "chapter": "第十章", "page": "151", "question": "当机组需要降低负荷时，风煤“交叉限幅”逻辑的安全动作顺序是？", "options": {"A": "先减煤，后减风", "B": "先减风，后减煤", "C": "仅减煤", "D": "仅减风"}, "answer": "A", "analysis": "降低负荷时，必须先减少燃料量，待实际燃料下降后，再允许送风量减少。这是为了防止降负荷瞬间因缺风而闷炉熄火。", "difficulty": "中等"}, {"type": "单选题", "id": 163, "chapter": "第十章", "page": "154", "question": "引风控制系统通常是一个以炉膛负压为主被调量的系统，为了提高抗扰能力，常引入什么作为前馈信号？", "options": {"A": "给水流量", "B": "送风机指令或送风量信号", "C": "汽包水位", "D": "主汽温"}, "answer": "B", "analysis": "送风量的变化是引起炉膛负压波动的最大内部扰动。引入送风前馈，可以在送风量改变时提前调节引风量，极大稳定负压。", "difficulty": "中等"}, {"type": "单选题", "id": 164, "chapter": "第十章", "page": "156", "question": "在引入了“热量信号”构成的串级燃料量控制系统中，主调节器的控制对象是？", "options": {"A": "燃料量指令", "B": "主蒸汽压力", "C": "炉膛温度", "D": "热量信号"}, "answer": "B", "analysis": "该串级系统的主被控参数是最终工艺指标——主蒸汽压力。主调节器根据汽压偏差输出热量需求指令。", "difficulty": "中等"}, {"type": "单选题", "id": 165, "chapter": "第十章", "page": "156", "question": "在带有热量信号的串级燃料控制系统中，副调节器的反馈信号是？", "options": {"A": "实际给煤机转速", "B": "实际总风量", "C": "热量信号（Q）", "D": "汽包水位"}, "answer": "C", "analysis": "副调节器接收主调发出的热量需求指令，并以实际锅炉发热量——“热量信号（Q）”作为反馈，快速调节给煤机克服大迟延。", "difficulty": "中等"}, {"type": "单选题", "id": 166, "chapter": "第十章", "page": "159", "question": "当检测到所有引风机全部跳闸停运时，燃烧控制系统会执行什么联锁动作？", "options": {"A": "全开送风机", "C": "维持燃料不变", "D": "仅报警"}, "answer": "B", "analysis": "引风机全跳意味着烟气无法排出。若继续送风给煤，炉膛将瞬间变为严重正压，导致火焰爆出。必须立即联锁跳闸送风机并触发MFT。", "difficulty": "中等"}, {"type": "单选题", "id": 167, "chapter": "第十章", "page": "148", "question": "为了克服锅炉燃料调节的大迟延，现代控制系统中常引入什么综合信号作为燃料量调节的副反馈信号？", "options": {"A": "汽压变化率", "B": "汽包水位", "C": "热量信号（Q）", "D": "炉膛温度"}, "answer": "C", "analysis": "“热量信号”能无迟延地反映炉膛内实际释放的总热量，作为副反馈可极大改善直吹式燃料控制的动态品质。", "difficulty": "困难"}, {"type": "单选题", "id": 168, "chapter": "第十章", "page": "149", "question": "锅炉的“热量信号”通常由以下哪两个参数通过计算合成得到？", "options": {"A": "给水与蒸汽流量", "B": "主蒸汽流量与汽包压力的微分（变化率）", "C": "燃料与送风", "D": "排烟温度与氧量"}, "answer": "B", "analysis": "炉膛放热量一部分用于产生蒸汽（主蒸汽流量），另一部分用于改变锅炉蓄热（汽包压力变化率表征），两者相加即为热量信号。", "difficulty": "困难"}, {"type": "单选题", "id": 169, "chapter": "第十章", "page": "155", "question": "锅炉燃烧过程中，如果实际送风量过多（过剩空气太大），会导致什么经济性损失显著增加？", "options": {"A": "化学不完全燃烧损失", "B": "机械不完全燃烧损失", "C": "排烟热损失", "D": "散热损失"}, "answer": "C", "analysis": "多余冷空气在炉膛内被加热后，会以较高排烟温度离开锅炉带走大量热量，导致最大的一项热损失——排烟热损失急剧增加。", "difficulty": "困难"}, {"type": "单选题", "id": 170, "chapter": "第十章", "page": "155", "question": "反之，如果燃烧过程中送风量不足，会导致什么损失增加？", "options": {"A": "排烟热损失", "B": "化学不完全燃烧和机械不完全燃烧热损失", "C": "蓄热量增加", "D": "水压下降"}, "answer": "B", "analysis": "风量不足导致氧气匮乏，燃料无法充分氧化产生一氧化碳等，或煤粉未烧尽排入灰渣中，严重降低热效率。", "difficulty": "困难"}, {"type": "单选题", "id": 171, "chapter": "第十章", "page": "158", "question": "在协调控制系统中，如果机组参与深度调峰（极低负荷运行），燃烧控制通常面临的最大风险是？", "options": {"A": "主汽压超限", "B": "炉膛负压过大", "C": "燃烧不稳甚至炉膛熄火", "D": "排烟温度过高"}, "answer": "C", "analysis": "低负荷炉膛温度极低，煤粉着火困难。此时若燃料或风量波动，极易发生燃烧不稳、火焰丧失甚至全炉膛灭火的恶性事故。", "difficulty": "困难"}, {"type": "单选题", "id": 180, "chapter": "第十一章", "page": "165", "question": "单元机组协调控制系统（CCS）在宏观上主要协调哪两大部分的能量供求平衡？", "options": {"A": "送风机与引风机", "B": "给水与凝结水", "C": "锅炉与汽轮机", "D": "磨煤机与燃烧器"}, "answer": "C", "analysis": "单元机组是一个整体，CCS的核心任务就是协调锅炉（供能设备）与汽轮机（耗能设备）之间的能量供求平衡。", "difficulty": "基础"}, {"type": "单选题", "id": 181, "chapter": "第十一章", "page": "166", "question": "协调控制系统的两个最主要的外部宏观被控参数是？", "options": {"A": "汽包水位和负压", "B": "机组实际输出功率和主蒸汽压力", "C": "主汽温和再热汽温", "D": "发电机电压电流"}, "answer": "B", "analysis": "协调控制系统对外满足电网负荷需求（控功率），对内保证机组运行安全性（控主汽压），这是CCS最核心目标。", "difficulty": "基础"}, {"type": "单选题", "id": 182, "chapter": "第十一章", "page": "170", "question": "在单元机组机炉负荷指令处理中，TF代表哪种控制方式？", "options": {"A": "锅炉跟随汽机", "B": "汽机跟随锅炉", "C": "机炉协调", "D": "手动"}, "answer": "B", "analysis": "TF（Turbine Follow）代表汽机跟随锅炉方式，即锅炉调负荷，汽机调阀门维持汽压。", "difficulty": "基础"}, {"type": "单选题", "id": 183, "chapter": "第十一章", "page": "170", "question": "在现代电网调度与火电厂协调控制中，缩写 AGC 通常指的是什么？", "options": {"A": "自动电压控制", "C": "自动燃烧", "D": "数字电液控制"}, "answer": "B", "analysis": "AGC是指机组CCS接受电网调度中心下发的实时指令，自动改变出力以满足电网二次调频和经济调度的运行模式。", "difficulty": "基础"}, {"type": "单选题", "id": 184, "chapter": "第十一章", "page": "171", "question": "锅炉跟随（BF）控制方式下，汽轮机调门和锅炉燃烧分别控制什么？", "options": {"A": "调门控汽压，锅炉控负荷", "B": "调门控负荷，锅炉控汽压", "C": "调门控汽温，锅炉控汽压", "D": "仅汽机控制"}, "answer": "B", "analysis": "BF方式下，汽机调门直接响应外部指令改变机组功率，锅炉则“跟随”汽机调节燃烧率来恢复和维持主蒸汽压力。", "difficulty": "基础"}, {"type": "单选题", "id": 185, "chapter": "第十一章", "page": "173", "question": "现代大型火电机组最常采用的“机炉协调控制（CCBF）”方式的核心思想是？", "options": {"A": "仅靠锅炉调节", "B": "仅靠汽机调节", "C": "机炉同时接收负荷指令动作，既利用蓄热加快响应，又协调维持汽压", "D": "独立运行"}, "answer": "C", "analysis": "协调控制综合了TF和BF优点。负荷变化时机炉同时动作，汽机利用蓄热快速响应，同时受汽压制约保证稳定。", "difficulty": "基础"}, {"type": "单选题", "id": 186, "chapter": "第十一章", "page": "180", "question": "在协调控制系统中，RB 代表什么重要的保护功能？", "options": {"A": "汽机超速保护", "B": "辅机故障快速减负荷（Runback）", "D": "旁路快开"}, "answer": "B", "analysis": "RB是指当重要辅助设备故障跳闸时，控制系统自动解除协调，极快将负荷迫降到剩余辅机能承担的安全容量的功能。", "difficulty": "基础"}, {"type": "单选题", "id": 187, "chapter": "第十一章", "page": "168", "question": "锅炉的“蓄热量”在机组变负荷中起重要作用。下列哪种锅炉蓄热量最大？", "options": {"A": "亚临界汽包锅炉", "B": "超临界直流锅炉", "C": "余热锅炉", "D": "生物质小型炉"}, "answer": "A", "analysis": "汽包锅炉拥有体积庞大、储存大量饱和水和蒸汽的汽包，其整体蓄热量远大于直流炉，缓冲能力强但热惯性大。", "difficulty": "中等"}, {"type": "单选题", "id": 188, "chapter": "第十一章", "page": "170", "question": "在汽机跟随（TF）控制方式下，汽轮机调节阀主要用于控制什么参数？", "options": {"A": "机组功率", "B": "主蒸汽压力", "C": "汽包水位", "D": "炉膛负压"}, "answer": "B", "analysis": "TF方式下，锅炉响应指令调节燃料改变功率，汽轮机则通过调节进汽阀门开度来维持主蒸汽压力恒定。", "difficulty": "中等"}, {"type": "单选题", "id": 189, "chapter": "第十一章", "page": "171", "question": "汽机跟随（TF）控制方式的主要优缺点是？", "options": {"A": "负荷响应快，汽压波动大", "B": "响应极快，汽压稳定", "C": "主汽压极其稳定，但机组对电网负荷指令响应缓慢", "D": "易超压"}, "answer": "C", "analysis": "TF方式下调门专门维持汽压，汽压极稳定；但变负荷全靠锅炉燃烧，热惯性大导致功率响应非常迟缓。", "difficulty": "中等"}, {"type": "单选题", "id": 190, "chapter": "第十一章", "page": "171", "question": "在 AGC 远控运行模式下，单元机组的目标负荷指令（ULD）主要来源于？", "options": {"A": "运行人员手动设定", "B": "电网调度中心下发的遥调指令", "C": "汽包压力计算", "D": "发电机电压"}, "answer": "B", "analysis": "投入AGC后，最高指挥权交由电网，调度中心计算机根据电网频率和潮流，通过远动通道直接向机组下发指令。", "difficulty": "中等"}, {"type": "单选题", "id": 191, "chapter": "第十一章", "page": "172", "question": "锅炉跟随（BF）控制方式下，机组对电网指令的响应速度相比于协调方式通常？", "options": {"A": "更快", "B": "更慢", "C": "相同", "D": "不确定"}, "answer": "A", "analysis": "BF方式下汽机调门直接响应指令，充分利用了锅炉蓄热，因此实际功率响应速度极快，但会导致汽压波动较大。", "difficulty": "中等"}, {"type": "单选题", "id": 192, "chapter": "第十一章", "page": "172", "question": "锅炉跟随（BF）控制方式的主要优缺点是？", "options": {"A": "汽压极其稳定", "B": "能充分利用锅炉蓄热，负荷响应极快，但主汽压波动较大", "C": "汽温容易超限", "D": "导致泵跳闸"}, "answer": "B", "analysis": "BF方式调门瞬间开大，利用蓄热增加产汽量，响应极快；但由于燃烧跟进需要时间，短时内会导致汽压大幅下降波动。", "difficulty": "中等"}, {"type": "单选题", "id": 193, "chapter": "第十一章", "page": "175", "question": "单元机组机炉协调控制系统中，缩写ALD通常代表什么？", "options": {"A": "锅炉主指令", "B": "汽机指令", "C": "实际负荷指令", "D": "限制指令"}, "answer": "C", "analysis": "ALD代表实际负荷指令，是经过速率限制、频差补偿等处理后，实际下发给机炉控制系统的最终负荷目标值。", "difficulty": "中等"}, {"type": "单选题", "id": 194, "chapter": "第十一章", "page": "176", "question": "机组接到目标负荷指令（ULD）后，通常需要经过哪些处理限制？", "options": {"A": "仅简单放大", "B": "上下限幅限制、变化速率限制和频差补偿等", "C": "微分处理", "D": "转模拟量"}, "answer": "B", "analysis": "为保护设备，指令不能直接送入执行机构，必须经过最高/最低限幅、最大升降速率限制，并叠加一次调频频差补偿。", "difficulty": "中等"}, {"type": "单选题", "id": 195, "chapter": "第十一章", "page": "181", "question": "下列哪种情况通常会触发机组的 RB（辅机故障减负荷）动作？", "options": {"A": "频率微小波动", "B": "凝结水泵单跳（备用泵联启）", "C": "两台并联运行的送风机中有一台跳闸", "D": "水位微波"}, "answer": "C", "analysis": "RB通常在失去主要“源”动力时触发，如送风机、一次风机单侧跳闸，机组最大出力瞬间减半，必须触发RB快降负荷。", "difficulty": "中等"}, {"type": "单选题", "id": 196, "chapter": "第十一章", "page": "182", "question": "当汽轮机调节阀已达到设定的最大开度上限时，协调系统应采取的限制逻辑是？", "options": {"B": "闭锁减小", "C": "紧急停机", "D": "强开安全阀"}, "answer": "A", "analysis": "调门全开说明已无增加负荷能力，此时必须在负荷回路中发出“闭锁增”信号，拒绝执行电网增负荷要求，防积分饱和。", "difficulty": "中等"}, {"type": "单选题", "id": 197, "chapter": "第十一章", "page": "185", "question": "若检测到主蒸汽压力大幅偏离安全设定值，控制系统通常都会触发什么安全逻辑？", "options": {"A": "解除协调转手动", "C": "切给水"}, "answer": "B", "analysis": "汽压偏差过大时，“交叉限制”逻辑会强行介入，如汽压极低时闭锁调门开大，牺牲负荷响应优先保住主汽压力不崩溃。", "difficulty": "中等"}, {"type": "单选题", "id": 198, "chapter": "第十一章", "page": "175", "question": "锅炉主控制器的输出指令（通常代表热量需求），在底层直接作为哪个子系统的设定值？", "options": {"B": "锅炉燃料量（及送风量）控制系统", "C": "水位控制", "D": "减温系统"}, "answer": "B", "analysis": "主控制器根据负荷和汽压偏差计算出热量指令，送到锅炉底层燃烧控制系统，直接作为燃料量和送风量控制器的设定值。", "difficulty": "困难"}, {"type": "单选题", "id": 199, "chapter": "第十一章", "page": "178", "question": "锅炉侧控制器常引入负荷指令的“微分前馈”补偿信号，目的是为了克服锅炉的什么不利特性？", "options": {"A": "测量噪声", "B": "燃料燃烧及产汽过程的巨大热惯性和纯滞后", "C": "送风非线性", "D": "调门死区"}, "answer": "B", "analysis": "引入负荷指令微分前馈，可在负荷刚变化瞬间让燃料量大幅“超前”过调动作，从而有效克服燃烧大迟延，加快产汽速度。", "difficulty": "困难"}, {"type": "单选题", "id": 200, "chapter": "第十一章", "page": "184", "question": "当多台制粉系统跳闸导致出力严重下降，为防汽压暴跌，系统通常自动将运行方式强行切换为？", "options": {"C": "手动", "D": "停机"}, "answer": "B", "analysis": "锅炉已无力增发蒸汽，为保主汽压力，协调系统自动强行转入TF方式，由汽轮机主动关小调门维持汽压，降至实际产汽能力。", "difficulty": "困难"}, {"type": "单选题", "id": 201, "chapter": "第十一章", "page": "185", "question": "采用“直接能量平衡（DEB）”策略时，通常用什么参数最准确代表汽机实际消耗能量？", "options": {"A": "有功功率", "B": "汽轮机调节级压力 p1​", "C": "主汽流量", "D": "真空"}, "answer": "B", "analysis": "调节级压力 p1​ 与流入汽机的蒸汽能量呈严格线性对应关系，排除了电网频率波动干扰，是表征汽机耗热最准确信号。", "difficulty": "困难"}, {"type": "单选题", "id": 202, "chapter": "第十一章", "page": "188", "question": "当电网频率突然下降时，如果机组投入了一次调频功能，实际负荷指令及控制动作将如何变化？", "options": {"A": "减负荷，关调门", "B": "自动增加负荷指令，开大汽机调门", "C": "保持不变", "D": "停机"}, "answer": "B", "analysis": "频率下降说明电网处于“供不应求”。一次调频自动在原负荷指令上叠加正偏置量，促使调门开大增加功率支援电网。", "difficulty": "困难"}, {"type": "单选题", "id": 214, "chapter": "第十二章", "page": "198", "question": "直流锅炉在点火启动阶段，由于没有汽包分离，通常依靠什么设备建立启动流量？", "options": {"A": "省煤器", "B": "凝汽器", "C": "启动分离器系统", "D": "高加"}, "answer": "C", "analysis": "直流炉启动初期水不能全部汽化，必须设置“启动分离器系统”分离汽水并将水回收到系统建立启动循环流量。", "difficulty": "基础"}, {"type": "单选题", "id": 215, "chapter": "第十二章", "page": "190", "question": "在直流锅炉的控制特点中，燃水比（燃料与给水比值）失调首先主要影响？", "options": {"A": "汽包水位", "B": "微过热点（中间点）温度", "C": "负压", "D": "再热汽压"}, "answer": "B", "analysis": "直流炉无汽包，燃水比失调会直接引起相变点位置移动，从而显著并迅速影响中间点温度和最终过热汽温。", "difficulty": "困难"}, {"type": "单选题", "id": 216, "chapter": "第十二章", "page": "190", "question": "直流锅炉燃水比控制中，若给水流量保持不变而燃料量突增，中间点和主汽温如何变化？", "options": {"A": "均上升", "B": "均下降", "C": "中间点升，主汽温降", "D": "均不变"}, "answer": "A", "analysis": "燃料突增输入热量增加，相变点提前。中间点温度会首先迅速上升，随后主蒸汽温度也会随之上升。", "difficulty": "困难"}, {"type": "单选题", "id": 217, "chapter": "第十二章", "page": "195", "question": "直流锅炉燃水比控制中，若给水量突增但燃料量未及时跟上，微过热点（中间点）温度如何变化？", "options": {"A": "上升", "B": "下降", "C": "先升后降", "D": "保持不变"}, "answer": "B", "analysis": "给水量突增导致加热区段延长，原有热量不足以加热增加的水量，相变点后移，中间点水分增加温度迅速下降。", "difficulty": "困难"}, {"type": "单选题", "id": 221, "chapter": "第十三章", "page": "208", "question": "循环流化床（CFB）锅炉控制系统区别于常规煤粉炉的最显著的独有控制对象是？", "options": {"A": "汽包水位", "B": "过热汽温", "C": "床温", "D": "负压"}, "answer": "C", "analysis": "循环流化床锅炉通过流态化燃烧，密相区床温控制是保证脱硫、燃烧效率和防止结焦的核心参数，是独有任务。", "difficulty": "基础"}, {"type": "单选题", "id": 222, "chapter": "第十三章", "page": "212", "question": "在CFB锅炉中，控制床温最常用且最直接的手段是调节什么？", "options": {"A": "给水流量", "B": "给煤量", "C": "引风量", "D": "减温水量"}, "answer": "B", "analysis": "床温的高低直接取决于燃烧释放热量，调节给煤量（燃料量）是控制床温最基本直接的手段，配合风量调节。", "difficulty": "中等"}, {"type": "单选题", "id": 225, "chapter": "第十四章", "page": "220", "question": "汽轮机旁路系统的主要作用不包括以下哪一项？", "options": {"A": "协调机炉启停时间", "B": "保护再热器", "C": "增加机组绝对发电量", "D": "回收工质热量"}, "answer": "C", "analysis": "旁路系统用于启停协调、保护再热器不干烧及回收工质，但绕过汽轮机会损失做功能力，不能增加发电量。", "difficulty": "基础"}, {"type": "单选题", "id": 230, "chapter": "第十五章", "page": "245", "question": "相比于常规PID，模糊控制（Fuzzy Control）在热工过程中的主要优势是？", "options": {"A": "结构简单", "B": "消除静差能力更强", "C": "不需要精确数学模型", "D": "运算最快"}, "answer": "C", "analysis": "热工对象往往具高度非线性和大迟延。模糊控制基于经验规则推理，不需要被控对象精确数学模型，鲁棒性强。", "difficulty": "中等"}, {"type": "单选题", "id": 231, "chapter": "第十五章", "page": "250", "question": "典型的二维模糊控制器，其输入变量通常是设定值与反馈值的偏差（e）以及？", "options": {"A": "偏差的变化率（ec）", "B": "纯滞后时间", "C": "给定值", "D": "积分时间"}, "answer": "A", "analysis": "工程上最常用二维模糊控制器输入变量是偏差（e）和偏差变化率（ec），这两者能充分反映当前状态和未来趋势。", "difficulty": "中等"}, {"type": "单选题", "id": 235, "chapter": "第十六/七章", "page": "262", "question": "预测控制（MPC）算法由三个基本环节组成，除了预测模型和滚动优化外，还包括？", "options": {"A": "比例积分", "B": "反馈校正", "C": "模糊推理", "D": "神经网络"}, "answer": "B", "analysis": "预测控制三大基本特征是：预测模型、滚动优化和反馈校正。反馈校正用于消除模型失配和未知干扰误差保证准确。", "difficulty": "困难"}, {"type": "单选题", "id": 236, "chapter": "第十六/七章", "page": "268", "question": "模型预测控制（MPC）相比常规PID，处理哪类问题时具有不可替代的优势？", "options": {"A": "多变量强耦合和带硬约束条件", "B": "单回路快速响应", "C": "无迟延对象", "D": "降成本"}, "answer": "A", "analysis": "MPC的滚动优化算法可显式加入变量上下限及变化率等硬约束条件，并能原生处理多变量间强耦合，这是PID无法做到的。", "difficulty": "困难"}, {"type": "单选题", "id": 238, "chapter": "第三章", "page": "34", "question": "[修正项] 比例控制的稳态偏差与什么参数成正比？（补充题）", "options": {"A": "比例带", "B": "积分时间", "C": "导数", "D": "阻尼"}, "answer": "A", "analysis": "比例带越大（放大倍数越小），其稳态控制偏差越大。", "difficulty": "基础"}, {"type": "单选题", "id": 239, "chapter": "第四章", "page": "50", "question": "[修正项] 气动薄膜执行机构正作用是指什么？（补充题）", "options": {"A": "气压增加，推杆向下移动", "B": "气压增加推杆向上", "C": "停气全开", "D": "停气全关"}, "answer": "A", "analysis": "气室在膜片上方，气压增加时克服弹簧力推动推杆向下伸出，称为正作用。", "difficulty": "基础"}, {"type": "单选题", "id": 240, "chapter": "第五章", "page": "67", "question": "[修正项] 串级控制副回路的响应速度应该？（补充题）", "options": {"A": "比主回路快", "B": "比主回路慢", "C": "相同", "D": "极其缓慢"}, "answer": "A", "analysis": "副回路的主要任务是快速发现并消除内部扰动，其工作频率和响应速度应显著快于包含大惯性对象的主回路。", "difficulty": "基础"}, {"type": "单选题", "id": 241, "chapter": "第六章", "page": "79", "question": "[修正项] 前馈控制是按照什么进行调节的？（补充题）", "options": {"A": "偏差", "B": "扰动", "C": "输出", "D": "设定值"}, "answer": "B", "analysis": "前馈控制通过测量扰动量直接进行开环补偿控制。", "difficulty": "基础"}, {"type": "单选题", "id": 242, "chapter": "第七章", "page": "85", "question": "[修正项] 单闭环比值控制系统的缺点？（补充题）", "options": {"A": "主动量不受控", "B": "从动量不受控", "C": "无法计算比值", "D": "过于复杂"}, "answer": "A", "analysis": "仅对从动量进行闭环控制跟随主动量，若主动量自身发生波动，系统无法控制主动量恢复，导致总流量波动。", "difficulty": "基础"}, {"type": "单选题", "id": 243, "chapter": "第一章", "page": "15", "question": "[修正项] 热工控制系统的静态是指？（补充题）", "options": {"A": "被调量不随时间变化的状态", "B": "控制器断电", "C": "阀门卡死", "D": "数据丢失"}, "answer": "A", "analysis": "系统的输入和输出（被调量）随时间保持恒定不变的平衡工作状态。", "difficulty": "基础"}, {"type": "单选题", "id": 244, "chapter": "第一章", "page": "16", "question": "[修正项] 衰减振荡过程的衰减比通常期望为？（补充题）", "options": {"A": "4:1 到 10:1 之间", "B": "1:1", "C": "0:1", "D": "发散"}, "answer": "A", "analysis": "工程上最期望的良好过渡过程是衰减振荡，通常最佳衰减比为4:1到10:1。", "difficulty": "基础"}], "多选题": [{"type": "多选题", "id": 4, "chapter": "第一章", "page": "14", "question": "对热工自动控制设备与系统的要求主要包括哪些？", "options": {"A": "工作可靠", "B": "专用的监控装置", "C": "抗干扰性能强", "D": "使用和维护方便"}, "answer": "ABCD", "analysis": "对热工自动控制设备与系统的要求包括：工作可靠；专用的监控装置；设备的抗干扰性能强；使用和维护方便。", "difficulty": "中等"}, {"type": "多选题", "id": 5, "chapter": "第一章", "page": "17", "question": "衡量一个控制过程质量的动态指标主要有？", "options": {"A": "衰减比或衰减率", "B": "最大偏差或超调量", "C": "调节时间", "D": "余差"}, "answer": "ABC", "analysis": "衰减比或衰减率、最大偏差或超调量和调节时间是衡量控制系统的动态指标，而余差是衡量控制系统的静态指标。", "difficulty": "困难"}, {"type": "多选题", "id": 29, "chapter": "第二章", "page": "26", "question": "测定对象动态特性的时域方法经常采用的瞬变扰动信号有？", "options": {"A": "正弦扰动", "B": "阶跃扰动", "C": "矩形脉冲扰动", "D": "随机白噪声"}, "answer": "BC", "analysis": "人为加一瞬变扰动测定对象的响应曲线，经常采用的扰动是阶跃扰动或矩形脉冲扰动。", "difficulty": "中等"}, {"type": "多选题", "id": 59, "chapter": "第三章", "page": "41-42", "question": "关于常规控制规律（PID）的描述，正确的是？", "options": {"A": "比例作用贯穿于整个控制过程之中", "B": "积分作用体现在控制过程的后期，用以消除静态偏差", "C": "微分作用体现在控制过程的初期，能减小动态偏差", "D": "积分作用能显著提高控制系统的稳定性"}, "answer": "ABC", "analysis": "比例作用贯穿始终；积分作用体现在后期消除静态偏差（但会使稳定性下降）；微分作用体现在初期，能减小动态偏差，缩短控制时间。", "difficulty": "困难"}, {"type": "多选题", "id": 60, "chapter": "第三章", "page": "33", "question": "工业过程控制中最普遍应用的常规 PID 控制器，包含哪几种基本的控制规律？", "options": {"A": "比例控制（P）", "B": "积分控制（I）"}, "answer": "ABC", "analysis": "PID 控制器是比例、积分、微分三种基本控制规律的组合。模糊控制属于先进控制策略。", "difficulty": "基础"}, {"type": "多选题", "id": 70, "chapter": "第四章", "page": "53", "question": "气动调节阀选择气开型（FC）还是气关型（FO）时，主要需要考虑的原则有哪些？", "options": {"A": "工艺设备的安全要求（断气保位）", "B": "控制系统的稳定性", "C": "减少仪表气源的消耗", "D": "防止介质泄漏"}, "answer": "AB", "analysis": "首要原则是安全，即控制气源中断时阀门停留位置能保护设备和人身安全；其次要考虑它与对象特性组合后使闭环系统处于稳定状态。", "difficulty": "中等"}, {"type": "多选题", "id": 71, "chapter": "第四章", "page": "56", "question": "单回路自动控制系统在进行参数整定时，工程上常用的实验整定方法主要有哪些？", "options": {"A": "临界比例带法（边界稳定法）", "B": "衰减曲线法", "C": "响应曲线法（飞升曲线法）", "D": "试凑法（经验法）"}, "answer": "ABCD", "analysis": "单回路系统工程常用的参数整定方法包括：闭环等幅振荡的临界比例带法、4:1衰减的衰减曲线法、开环阶跃的响应曲线法以及结合经验的试凑法。", "difficulty": "中等"}, {"type": "多选题", "id": 79, "chapter": "第五章", "page": "68-71", "question": "相比于单回路控制系统，串级控制系统的主要特点包括？", "options": {"A": "对进入副回路的二次干扰具有很强的克服能力", "B": "可以使副回路的时间常数大大减小", "C": "提高了系统的工作频率", "D": "有一定的自适应能力"}, "answer": "ABCD", "analysis": "串级控制系统特点：克服二次干扰能力强；减小副回路时间常数；提高工作频率；具有一定的自适应能力。", "difficulty": "困难"}, {"type": "多选题", "id": 80, "chapter": "第五章", "page": "72", "question": "在串级控制系统的设计和参数整定中，关于主、副控制器的描述，正确的是？", "options": {"A": "副回路主要起快速抗扰作用，副控制器一般采用纯 P 或 PI 规律", "C": "整定时通常按照“先副后主”的顺序进行", "D": "主、副控制器必须同时采用纯比例控制"}, "answer": "ABC", "analysis": "副回路要求快速消除扰动允许微小静差（P或PI）；主回路要求精确维持给定值（PI或PID）；整定参数时需先闭合副环再闭合主环。", "difficulty": "困难"}, {"type": "多选题", "id": 83, "chapter": "第六章", "page": "80", "question": "关于“前馈-反馈复合控制系统”，下列说法正确的有？", "options": {"A": "前馈控制用于粗调，针对主要干扰迅速做出补偿", "B": "反馈控制用于细调，消除模型误差和其他未知干扰引起的残余偏差", "C": "系统兼具前馈的快速性和反馈的准确性", "D": "不需要任何变送器参与"}, "answer": "ABC", "analysis": "复合系统结合了两者优点。前馈通道针对主要可测扰动快速“粗调”；反馈回路克服前馈不精确及不可测干扰进行“细调”。系统必须依赖变送器测量，D错。", "difficulty": "困难"}, {"type": "多选题", "id": 112, "chapter": "第八章", "page": "98", "question": "运行中影响过热蒸汽温度发生变化的扰动主要有哪些？", "options": {"A": "烟气侧扰动（燃料量、风量）", "B": "蒸汽侧扰动（蒸汽负荷）", "C": "减温水流量扰动", "D": "给水温度扰动"}, "answer": "ABCD", "analysis": "引起过热汽温变化的扰动包括烟气侧传热变化、工质侧蒸汽流量变化、给水温度变化以及执行侧的减温水量变化。", "difficulty": "中等"}, {"type": "多选题", "id": 141, "chapter": "第九章", "page": "125", "question": "汽包锅炉的给水控制系统在机组启动初期（低负荷）和正常运行（高负荷）阶段的控制策略差异通常是？", "options": {"A": "低负荷阶段常采用单冲量", "B": "高负荷阶段常采用三冲量", "C": "低负荷三冲量", "D": "高负荷单冲量"}, "answer": "AB", "analysis": "低负荷时蒸汽流量小且测不准，虚假水位不明显，采用单冲量；高负荷（通常30%以上）切换为三冲量以克服虚假水位和水压扰动。", "difficulty": "中等"}, {"type": "多选题", "id": 142, "chapter": "第九章", "page": "128", "question": "在分析锅炉汽包水位动态特性时，以下哪些因素被视为引起水位变化的扰动量？", "options": {"A": "主蒸汽流量的变化", "B": "给水流量的变化", "C": "炉内燃烧热负荷的变化", "D": "环境温度的微小波动"}, "answer": "ABC", "analysis": "引起汽包水位变化的三个主要扰动是：蒸汽负荷扰动（产生虚假水位）、给水流量扰动和燃烧放热量扰动。环境温度影响可忽略。", "difficulty": "中等"}, {"type": "多选题", "id": 143, "chapter": "第九章", "page": "116", "question": "在汽包锅炉运行中，引起汽包水位发生动态变化的主要内外部扰动包括？", "options": {"A": "蒸汽负荷（流量）扰动", "B": "给水流量（压力）扰动", "C": "燃料量（热负荷）扰动", "D": "锅炉排污量扰动"}, "answer": "ABC", "analysis": "主要扰动是蒸汽负荷扰动、给水流量扰动和燃料热负荷扰动。排污量通常较小且稳定，不作为主要动态扰动考虑。", "difficulty": "困难"}, {"type": "多选题", "id": 172, "chapter": "第八至十章", "page": "115", "question": "现代火电厂大型锅炉机组的主要热工自动控制系统通常包括哪些？", "options": {"A": "汽包锅炉给水控制", "B": "锅炉燃烧自动控制", "C": "蒸汽温度（过热与再热）控制", "D": "机炉协调控制"}, "answer": "ABCD", "analysis": "锅炉侧三大常规控制为给水（水位）、燃烧（汽压/风煤比）、汽温，此外机炉整体需要协调控制系统进行能量统一调度。", "difficulty": "中等"}, {"type": "多选题", "id": 173, "chapter": "第十章", "page": "142", "question": "锅炉燃烧自动控制系统一般包含哪几个相互关联的子系统？", "options": {"A": "燃料量控制", "B": "送风量控制", "C": "引风量控制", "D": "给水流量控制"}, "answer": "ABC", "analysis": "燃烧系统包含燃料量（控汽压）、送风量（控风煤比）和引风量（控负压）三个子系统；给水属于独立系统。", "difficulty": "困难"}, {"type": "多选题", "id": 174, "chapter": "第十章", "page": "146", "question": "采用直吹式制粉系统的燃煤锅炉，其燃料控制中的主要时间迟延来自于？", "options": {"A": "皮带传送迟延", "B": "磨煤机碾磨和干燥迟延", "C": "煤粉管道输送迟延", "D": "炉膛热交换迟延"}, "answer": "ABC", "analysis": "燃料从下达指令开始，需经历皮带传送、碾磨干燥、长距离吹送至炉膛，这三个物理过程构成了燃料控制的大滞后。", "difficulty": "困难"}, {"type": "多选题", "id": 203, "chapter": "第十一章", "page": "168", "question": "单元机组协调控制系统（CCS）的典型运行方式通常包括哪些？", "options": {"D": "手动（Manual）"}, "answer": "ABCD", "analysis": "CCS根据设备运行状况可切入多种工作模式，主要包含机炉协调、汽机跟随、锅炉跟随、机炉手动等方式。", "difficulty": "中等"}, {"type": "多选题", "id": 204, "chapter": "第十一章", "page": "173", "question": "影响单元机组负荷响应速度及动态特性的主要因素有？", "options": {"A": "锅炉的蓄热量大小", "B": "制粉系统的惯性和迟延", "C": "汽轮机容积的迟延", "D": "汽包水位的动态波动"}, "answer": "ABC", "analysis": "负荷响应主要受到锅炉侧蓄热量、制粉系统的巨大延迟，以及汽轮机高压缸及管路蒸汽容积迟延的共同影响。", "difficulty": "中等"}, {"type": "多选题", "id": 205, "chapter": "第十一章", "page": "176", "question": "在机组参与电网自动发电控制（AGC）运行方式下，机组目标负荷指令（ULD）可能需要受到控制系统内部的哪些限制？", "options": {"A": "负荷上下限幅限制", "B": "负荷变化率限制", "D": "频差补偿及一次调频限制"}, "answer": "ABCD", "analysis": "AGC指令不能直接送入机炉，必须经过限幅、速率限制、RB逻辑覆盖以及一次调频频差补偿等综合处理。", "difficulty": "困难"}, {"type": "多选题", "id": 206, "chapter": "第十一章", "page": "185", "question": "单元机组协调控制系统在异常工况下的快速保护功能（如 RB），通常会联锁触发以下哪些动作？", "options": {"A": "强制解除机炉协调方式", "B": "快速降低目标负荷指令至安全值", "C": "联锁切除部分制粉系统（燃料）", "D": "自动开启旁路防超压"}, "answer": "ABCD", "analysis": "RB触发时会自动解除协调，强降目标负荷至极限内，同时为配合降负荷和防超压切除相应燃料，并可能开启旁路。", "difficulty": "困难"}, {"type": "多选题", "id": 218, "chapter": "第十二章", "page": "188", "question": "直流锅炉与汽包锅炉相比，在动态特性上的主要区别包括？", "options": {"A": "无汽包，没有水位变化的缓冲能力", "B": "蓄热量小，反应灵敏", "C": "各段受热面界限不固定", "D": "水位极难控制"}, "answer": "ABC", "analysis": "直流炉无汽包蓄热量小且加热界限变动；但正因无汽包，故不存在“汽包水位”控制参数（D错）。", "difficulty": "困难"}, {"type": "多选题", "id": 219, "chapter": "第十二章", "page": "188", "question": "直流锅炉由于没有汽包，其控制系统的主要任务与汽包炉有所不同，主要包括哪些？", "options": {"A": "保持燃水比精确比例", "B": "控制汽包水位稳定", "C": "维持主汽压稳定", "D": "维持微过热点温度稳定"}, "answer": "ACD", "analysis": "直流炉无汽包不控水位（B错）。核心任务是保持严格燃水比以控相变点位置，维持汽温，同时维持主汽压。", "difficulty": "困难"}, {"type": "多选题", "id": 223, "chapter": "第十三章", "page": "215", "question": "循环流化床（CFB）锅炉自动控制系统的主要难点包括哪些？", "options": {"A": "多变量强耦合严重", "B": "被控对象非线性严重", "C": "燃烧过程大迟延", "D": "无法建立水位"}, "answer": "ABC", "analysis": "CFB床温、床压、负荷等变量耦合极强，且系统存在严重非线性和大容量迟延；但CFB也有汽包炉形式，D错。", "difficulty": "中等"}, {"type": "多选题", "id": 226, "chapter": "第十四章", "page": "220", "question": "现代大型机组的汽轮机旁路控制系统，从工艺和控制范围上通常可划分为哪些部分？", "options": {"A": "高压旁路压力及减温控制", "B": "低压旁路压力及减温控制", "C": "凝汽器真空控制", "D": "发电机控制"}, "answer": "AB", "analysis": "旁路系统主要由高压旁路（降主汽至再热冷段）和低压旁路（降再热汽至凝汽器）两部分压力和温度控制组成。", "difficulty": "中等"}, {"type": "多选题", "id": 227, "chapter": "第十四章", "page": "222", "question": "汽轮机旁路控制系统通常具备的功能包括？", "options": {"A": "协调启停缩短时间", "B": "机组跳闸时保护再热器", "C": "回收工质热量", "D": "励磁电压调节"}, "answer": "ABC", "analysis": "作用是启停协调、保护再热器、回收工质和控压力；发电机励磁调节属电气控制范围。", "difficulty": "中等"}, {"type": "多选题", "id": 228, "chapter": "第十四章", "page": "226", "question": "汽轮机旁路控制系统中的核心执行元件——旁路减温减压阀，通常需具备哪些特性？", "options": {"A": "极快开启速度", "B": "能承受极大压降", "C": "优良的减温水雾化", "D": "大流量低噪声"}, "answer": "ABCD", "analysis": "旁路阀在紧急工况动作必须开启极快；需将高温高压降至中低压承受巨压并喷水，故快开、耐大压降、强雾化和低噪声是必备特性。", "difficulty": "中等"}, {"type": "多选题", "id": 232, "chapter": "第十五章", "page": "246", "question": "一个典型的模糊控制器通常由以下哪些基本部分组成？", "options": {"A": "模糊化接口", "B": "知识库（规则库）", "C": "模糊推理机", "D": "解模糊接口"}, "answer": "ABCD", "analysis": "输入先“模糊化”，根据“知识库”规则由“推理机”推理，最后通过“解模糊”接口转化为精确控制信号。", "difficulty": "中等"}, {"type": "多选题", "id": 233, "chapter": "第十五章", "page": "255", "question": "神经网络控制技术应用于热工过程控制时，展现出的主要优势包括？", "options": {"A": "逼近任意非线性映射", "B": "无需预知数学结构具自学习能力", "C": "容错性分布存储", "D": "逻辑清晰像“白盒”"}, "answer": "ABC", "analysis": "神经网络能极好拟合非线性对象且自学习容错强（ABC正确）。但它是一个典型的“黑盒”模型，内部权值分布缺乏物理意义（D错）。", "difficulty": "困难"}, {"type": "多选题", "id": 237, "chapter": "第十六/七章", "page": "265", "question": "模型预测控制（MPC）等先进控制策略在火电厂中主要应用于解决哪些问题？", "options": {"A": "大纯滞后系统的控制", "B": "多变量强耦合系统解耦", "C": "带约束条件的优化控制", "D": "单回路液位控制"}, "answer": "ABC", "analysis": "MPC在处理大迟延、多变量耦合以及多约束复杂工业过程时表现出明显优势（如机炉协调和主汽温）。单回路液位用PID即可（D错）。", "difficulty": "困难"}], "简答题": [{"type": "简答题", "id": 6, "chapter": "第一章", "page": "16", "question": "什么是自动控制系统的过渡过程？", "options": {}, "answer": "见解析", "analysis": "当有扰动发生时，系统的平衡状态被破坏，被调量偏离给定值，经过调节直到系统重新建立平衡。系统从一个平衡状态过渡到另一个平衡状态的过程，称为控制系统的过渡过程。", "difficulty": "中等"}, {"type": "简答题", "id": 30, "chapter": "第二章", "page": "21", "question": "简述有自平衡能力对象与无自平衡能力对象的区别。", "options": {}, "answer": "见解析", "analysis": "有自平衡能力对象是指受到干扰作用后，在不需要任何外力控制下，依靠自身能力可自发恢复到新平衡的对象；无自平衡能力对象是指受到扰动后，被调量不能依靠自身能力使之趋于稳定值，会不断变化的对象。", "difficulty": "困难"}, {"type": "简答题", "id": 31, "chapter": "第二章", "page": "20", "question": "简述什么是过程的自平衡能力。", "options": {}, "answer": "见解析", "analysis": "自平衡能力是指被控对象在受到外部扰动使得原有的平衡状态被破坏后，不需要外部控制器的干预，仅依靠对象自身的内部物理特性，就能自动使得输出变量随着时间的推移逐渐趋向并稳定在一个新的平衡状态的能力。", "difficulty": "中等"}, {"type": "简答题", "id": 32, "chapter": "第二章", "page": "29", "question": "简述建立过程数学模型的“机理分析法”和“实验测定法”的基本概念。", "options": {}, "answer": "见解析", "analysis": "机理分析法是根据过程内部的物理化学定律，通过理论推导建立描述对象输入输出关系的微分方程；实验测定法是在对象输入端施加测试信号，记录其输出响应数据，利用数学方法拟合出等效数学模型。", "difficulty": "中等"}, {"type": "简答题", "id": 33, "chapter": "第二章", "page": "21", "question": "什么是过程的纯迟延（纯滞后）和容量迟延？它们产生的原因有何不同？", "options": {}, "answer": "见解析", "analysis": "纯迟延是指输入发生变化后，输出需要等待一段时间才开始发生变化的现象，原因通常是物料/能量在管道中传输需要时间。容量迟延是指输出虽立即开始变化，但由于系统存在容纳物料/能量的“容量”和阻碍其传递的“阻力”，导致变化速度不能瞬间达到最大，表现为指数或S型缓慢变化的过程。", "difficulty": "困难"}, {"type": "简答题", "id": 34, "chapter": "第二章", "page": "25", "question": "写出带纯滞后的一阶惯性环节的传递函数表达式，并说明式中各参数的物理意义。", "options": {}, "answer": "见解析", "analysis": "表达式为 G(s)=K⋅e−τs/(Ts+1)。K为对象的放大系数，表征静态特性；T为对象的时间常数，表征对象动态响应的快慢（惯性大小）；τ为对象的纯滞后时间，表征信号传输或反应的停滞死区时间。", "difficulty": "困难"}, {"type": "简答题", "id": 35, "chapter": "第二章", "page": "24", "question": "在利用阶跃响应曲线法测定过程动态特性时，对测试条件有哪些基本要求？", "options": {}, "answer": "见解析", "analysis": "1) 测定前系统必须处于稳定的定常工况；2) 施加的阶跃扰动应足够快速；3) 阶跃幅值应适中，既要保证响应信号足够大克服噪声，又要确保对象未脱离线性工作区；4) 记录时间应足够长，直至被调量完全进入新稳态；5) 尽量避免其他未知的随机干扰。", "difficulty": "困难"}, {"type": "简答题", "id": 61, "chapter": "第三章", "page": "35-36", "question": "比例积分（PI）控制规律中，积分作用的引入会带来什么优缺点？", "options": {}, "answer": "见解析", "analysis": "优点是只要有偏差存在积分控制作用就一直增加，从而消除系统的稳态偏差，实现无差控制；缺点是积分控制作用迟缓，会恶化系统的动态品质，使过渡过程的振荡加剧，导致控制系统稳定性下降。", "difficulty": "困难"}, {"type": "简答题", "id": 62, "chapter": "第三章", "page": "36", "question": "简述双位控制规律的特点及其主要的工业应用场合。", "options": {}, "answer": "见解析", "analysis": "特点：结构简单、成本低；输出只能是全开或全关；过渡过程必然是持续等幅振荡。场合：对控制动态品质要求不高、对象容量大且允许被调量波动的场合，如恒温箱、液位上下限控制等。", "difficulty": "中等"}, {"type": "简答题", "id": 63, "chapter": "第三章", "page": "40", "question": "什么是比例调节的静态偏差（余差）？它产生的原因是什么？", "options": {}, "answer": "见解析", "analysis": "静态偏差是指系统受扰动重新稳态后，被调量与设定值之间的不可消除偏差。原因：比例控制器的输出增量依赖输入偏差。当负荷改变需新输出开度时，必须有稳态偏差维持此输出，故为“有差调节”。", "difficulty": "困难"}, {"type": "简答题", "id": 64, "chapter": "第三章", "page": "42", "question": "积分调节规律为什么能够消除静态偏差？为什么在工业控制中极少单独使用纯积分调节器？", "options": {}, "answer": "见解析", "analysis": "消除静差原因：只要偏差不为零，积分输出就随时间累积，直到偏差为零系统才平衡。不单用原因：纯积分作用极其缓慢，且引入90度相位滞后，极大降低响应速度和稳定性，易引起剧烈振荡。", "difficulty": "困难"}, {"type": "简答题", "id": 65, "chapter": "第三章", "page": "48", "question": "简述微分调节作用具有“超前控制”的物理意义，并说明它对系统过渡过程的积极影响。", "options": {}, "answer": "见解析", "analysis": "物理意义：微分根据偏差“变化速度”动作，在偏差刚露头且有扩大趋势时，立即输出强大修正信号，具预见性。积极影响：等效于增加物理阻尼，减小动态超调量，缩短过渡时间，改善大滞后对象稳定性。", "difficulty": "困难"}, {"type": "简答题", "id": 66, "chapter": "第三章", "page": "51", "question": "综合分析比例积分微分（PID）控制规律中 P、I、D 三者各自的分工与协作关系。", "options": {}, "answer": "见解析", "analysis": "P是基础，快速成比例响应偏差粗调系统；I负责后期，通过时间累积消除静差，保证稳态精度；D负责早期干预，根据变化趋势提前介入阻尼，克服P过强或I引入的滞后，改善动态品质。三者结合达到快准稳。", "difficulty": "困难"}, {"type": "简答题", "id": 72, "chapter": "第四章", "page": "59", "question": "简述单回路控制系统参数整定的“临界比例带法”的基本步骤。", "options": {}, "answer": "见解析", "analysis": "1) 将控制器设为纯比例作用；2) 系统投入闭环运行，逐步减小比例带直到出现等幅振荡，记下临界比例带和临界振荡周期；3) 根据经验公式表计算控制器的各个参数；4) 投入参数后做阶跃试验，适当修改整定。", "difficulty": "困难"}, {"type": "简答题", "id": 73, "chapter": "第四章", "page": "62", "question": "简述在过程控制中，选择调节阀流量特性（如线性或等百分比特性）的基本原则。", "options": {}, "answer": "见解析", "analysis": "选择原则是“补偿原则”。即通过调节阀流量特性的非线性来补偿被控对象等其他环节的非线性，使整个闭环系统（广义对象）的总放大系数在不同负荷工况下保持基本不变，从而保证全量程稳定性。", "difficulty": "中等"}, {"type": "简答题", "id": 84, "chapter": "第六章", "page": "78", "question": "什么是前馈控制？它与传统的反馈控制有什么本质区别？", "options": {}, "answer": "见解析", "analysis": "前馈控制是在干扰出现时直接根据测得扰动大小和方向按规律控制以补偿影响。区别：反馈控制是“事后调节”（根据偏差动作，滞后），前馈是“事前调节”（直接根据扰动动作），控制远比反馈及时。", "difficulty": "困难"}, {"type": "简答题", "id": 85, "chapter": "第六章", "page": "80", "question": "简述前馈控制与反馈控制结合构成的“前馈-反馈复合控制系统”的设计思想及其优点。", "options": {}, "answer": "见解析", "analysis": "设计思想：将反馈与前馈结合，反馈为主回路保证稳定和无差控制，将主要扰动作为前馈信号叠加在输出上。优点：前馈“粗调”迅速抵消主要干扰；反馈“细调”消除残余偏差和不可测干扰。两者互补极大提高响应速度和静态精度。", "difficulty": "困难"}, {"type": "简答题", "id": 113, "chapter": "第八章", "page": "98", "question": "在火电厂实际运行中，引起过热蒸汽温度发生动态变化的主要扰动因素有哪些？", "options": {}, "answer": "见解析", "analysis": "分为三大类：1)烟气侧扰动（燃料量、送风量、火焰中心高度改变等）；2)蒸汽侧扰动（机组负荷改变引起的蒸汽流量变化，以及给水温度变化）；3)控制执行侧扰动（减温水母管压力波动或阀门动作引起的水量变化）。", "difficulty": "中等"}, {"type": "简答题", "id": 114, "chapter": "第八章", "page": "103", "question": "简述典型的过热汽温串级控制系统的基本结构及其工作原理。", "options": {}, "answer": "见解析", "analysis": "结构：由主、副两闭环嵌套。主环以出口主汽温为主被控量，主控制器保证无差稳定；副环以减温器后汽温为副被控量，副控制器操纵水阀。原理：减温水压等扰动发生时，副回路快速动作消除；负荷等引起主汽温偏离时，主控制器改变副回路设定值，指挥其动作克服大迟延，保证精确控制。", "difficulty": "中等"}, {"type": "简答题", "id": 115, "chapter": "第八章", "page": "105", "question": "过热蒸汽温度控制中，为什么常采用串级控制系统（引入减温器后温度作为导前信号）？", "options": {}, "answer": "见解析", "analysis": "过热器管道较长，热惯性极大，单回路控制调节十分滞后。采用串级控制引入导前信号，能够极其迅速地反映减温水量或烟气扰动引起的变化，副回路可以提前动作克服干扰，大大改善汽温控制的动态品质。", "difficulty": "中等"}, {"type": "简答题", "id": 116, "chapter": "第八章", "page": "110", "question": "为什么锅炉再热汽温的控制一般不采用喷水减温作为主要调节手段？", "options": {}, "answer": "见解析", "analysis": "过多使用喷水减温会增加低压缸做功的蒸汽流量，但由于这部分蒸汽未经过高压缸最高参数做功环节，会显著降低机组的循环热效率。因此再热汽温常采用烟气挡板等烟气侧调节作为主要手段，喷水仅作超温保护。", "difficulty": "中等"}, {"type": "简答题", "id": 117, "chapter": "第八章", "page": "104", "question": "什么是导前汽温？在主蒸汽温度控制系统中引入导前汽温（或导前微分）信号有什么重要意义？", "options": {}, "answer": "见解析", "analysis": "导前汽温是位于减温器出口、主汽温测点之前的蒸汽温度。意义：从减温水动作到主汽温变化存在极大纯迟延。引入导前信号，能在扰动尚未严重波及出口前极早发现变化趋势并促使控制器提前动作，等效于缩短了迟延时间，显著提高响应速度。", "difficulty": "困难"}, {"type": "简答题", "id": 118, "chapter": "第八章", "page": "112", "question": "简述利用改变“燃烧器倾角（摆角）”来调节再热汽温的工作原理。", "options": {}, "answer": "见解析", "analysis": "当再热汽温偏低需升温时，燃烧器倾角向上摆动，炉膛火焰中心上移，导致水冷壁辐射吸热量相对减少，离开炉膛进入尾部的烟温升高。烟温升高显著增加布置在尾部的再热器对流吸热量，使汽温升高。反之则降温。", "difficulty": "困难"}, {"type": "简答题", "id": 144, "chapter": "第九章", "page": "115", "question": "简述汽包锅炉给水自动控制系统的三大主要任务。", "options": {}, "answer": "见解析", "analysis": "1)维持汽包水位在安全规定的上下限允许范围之内；2)保持锅炉的给水质量流量与输出的蒸发量时刻相适应，维持物料平衡；3)保持给水流量的平稳变化，避免大幅波动干扰炉内燃烧和汽温控制。", "difficulty": "中等"}, {"type": "简答题", "id": 145, "chapter": "第九章", "page": "118", "question": "什么是汽包锅炉的“虚假水位”现象？简述其产生的主要原因。", "options": {}, "answer": "见解析", "analysis": "虚假水位是指蒸汽负荷突变时，汽包水位短时间内呈现出与实际水量增减相反的动态现象。原因：蒸汽流量突增导致汽包压力急降，炉水饱和温度降低发生附加汽化，汽泡容积急剧膨胀，将水位瞬间“托高”。", "difficulty": "中等"}, {"type": "简答题", "id": 146, "chapter": "第九章", "page": "122", "question": "简述双冲量给水控制系统的构成原理，以及它是如何克服“虚假水位”现象的。", "options": {}, "answer": "见解析", "analysis": "构成：由汽包水位信号（主反馈）和蒸汽流量信号（前馈补偿）构成。克服机理：蒸汽流量突增引起水位假性升高时，水位反馈试图关小阀门；但蒸汽流量前馈通道立即察觉用汽量增加，发出开大阀门指令。只要前馈强度大于反馈误动作强度，调节阀就会正确开大，抵消虚假水位的误导。", "difficulty": "中等"}, {"type": "简答题", "id": 147, "chapter": "第九章", "page": "118", "question": "详细解释“虚假水位”对单纯依靠水位反馈的单冲量控制系统有什么致命影响。", "options": {}, "answer": "见解析", "analysis": "负荷突增导致压力下降、汽泡膨胀，水位呈现假性升高。由于水位假性升高，单冲量水位控制器会误认为锅炉水满，从而输出指令关小调节阀，这与实际需增加水量的方向完全相反，进一步加剧了随之而来的严重缺水状态，导致控制完全反向恶化。", "difficulty": "困难"}, {"type": "简答题", "id": 148, "chapter": "第九章", "page": "122", "question": "简述汽包锅炉“三冲量”给水控制系统的工作原理。", "options": {}, "answer": "见解析", "analysis": "三冲量以汽包水位为主反馈，蒸汽流量为前馈补偿，给水流量为副反馈组成串级前馈混合系统。蒸汽前馈快速克服“虚假水位”导致的误动作；给水流量副环迅速消除给水压力波动引起的水量内扰；汽包水位主环最终确保无差回到给定值。", "difficulty": "困难"}, {"type": "简答题", "id": 149, "chapter": "第九章", "page": "124", "question": "为什么在现代大型火电机组中，必须在双冲量的基础上增加给水流量信号，构成“三冲量”给水控制系统？", "options": {}, "answer": "见解析", "analysis": "双冲量系统对于执行侧发生的内扰（如给水母管压力剧烈波动）完全没有防御能力，只能等水位出现明显偏差后才动作，严重滞后。引入给水流量构成副闭环后，任何给水压力内扰都会瞬间在副环内被检测并消除，使其根本无法波及汽包水位，极大提高抗内扰能力。", "difficulty": "困难"}, {"type": "简答题", "id": 150, "chapter": "第九章", "page": "128", "question": "什么是给水“全程自动控制系统”？它在控制策略和执行机构上通常包含哪些自动切换过程以适应机组全工况运行？", "options": {}, "answer": "见解析", "analysis": "适应从点火启动到满负荷全过程的控制系统。切换过程：1)策略切换：启动极低负荷时（蒸汽量小且测不准），自动运行单冲量模式；负荷升高后无扰平滑切换至三冲量；2)机构切换：启动初期控制旁路小阀；负荷上升后平滑过渡至主给水大阀；高负荷时自动切换为直接调节给水泵转速控制以节能。", "difficulty": "困难"}, {"type": "简答题", "id": 175, "chapter": "第十章", "page": "142", "question": "简述锅炉燃烧自动控制系统的三个基本任务。", "options": {}, "answer": "见解析", "analysis": "1)控制主汽压稳定：调节燃料量，使锅炉产热与外界耗热相适应；2)保证燃烧经济性：调节送风量维持最佳风煤比；3)维持锅炉安全环境：调节引风量，使炉膛维持在微负压状态防外喷或漏风。", "difficulty": "中等"}, {"type": "简答题", "id": 176, "chapter": "第十章", "page": "147", "question": "直吹式制粉系统和中间储仓式制粉系统在燃料自动控制的动态特性上有什么主要区别？", "options": {}, "answer": "见解析", "analysis": "储仓式调节粉仓下方的给粉机，煤粉立即入炉，对指令响应快无明显滞后。直吹式无粉仓，调节最前端给煤机，煤需经传送、碾磨干燥再吹入炉膛，存在极大纯迟延和容量迟延，控制难度远大于储仓式。", "difficulty": "中等"}, {"type": "简答题", "id": 177, "chapter": "第十章", "page": "154", "question": "简述引风控制系统（炉膛负压控制）的基本策略，说明为什么通常要引入送风指令作为前馈信号。", "options": {}, "answer": "见解析", "analysis": "策略是以负压为被调量的闭环系统，调引风机出力维持负压。引入送风前馈是因为送风量变化是打破压力平衡最主要扰动，将送风指令引入可在风量刚改变时让引风机提前同步按比例增减出力，极大提高稳定性。", "difficulty": "中等"}, {"type": "简答题", "id": 178, "chapter": "第十章", "page": "148", "question": "什么是锅炉的“热量信号”？为什么直吹式系统的燃料控制中需要引入热量信号作为副反馈？", "options": {}, "answer": "见解析", "analysis": "热量信号是综合反映炉内实际放热量的计算信号（主蒸汽流量+汽包压力微分）。引入原因：直吹式从给煤到燃烧迟延巨大。仅靠汽压反馈响应极慢易振荡。引入能瞬间反映实际放热的“热量信号”作副环反馈，可提前感知燃料侧扰动，极大改善动态品质。", "difficulty": "困难"}, {"type": "简答题", "id": 179, "chapter": "第十章", "page": "150", "question": "详细解释“风煤交叉限幅”联锁逻辑的作用及其具体动作过程。", "options": {}, "answer": "见解析", "analysis": "作用：确保负荷调节中始终富氧燃烧，防缺氧爆燃。动作过程：1)加负荷时，强制先开大送风机，实际风量上升后才“解锁”允许燃料量增加（先加风后加煤）；2)降负荷时，强制先关小给煤机，燃料量下降后才允许送风量减少（先减煤后减风）。", "difficulty": "困难"}, {"type": "简答题", "id": 207, "chapter": "第十一章", "page": "166", "question": "简述单元机组协调控制系统（CCS）的主要任务及其对外、对内的控制目标。", "options": {}, "answer": "见解析", "analysis": "对外任务：快速准确响应电网负荷指令，参与电网调峰调频；对内任务：协调锅炉和汽机动作，使能量供应与耗汽量匹配，维持主汽压、汽温等关键参数在安全范围内。", "difficulty": "中等"}, {"type": "简答题", "id": 208, "chapter": "第十一章", "page": "170", "question": "什么是汽机跟随控制方式（TF）？简述其工作原理及主要的优缺点。", "options": {}, "answer": "见解析", "analysis": "原理：锅炉主控接受负荷指令调节燃料改变产汽量；汽机主控将汽压作被控量调节阀门“跟随”产汽量维持汽压。优点：汽压极稳定，运行安全。缺点：功率改变全赖锅炉缓慢燃烧，负荷响应极其迟缓。", "difficulty": "困难"}, {"type": "简答题", "id": 209, "chapter": "第十一章", "page": "171", "question": "什么是锅炉跟随控制方式（BF）？简述其工作原理及主要的优缺点。", "options": {}, "answer": "见解析", "analysis": "原理：汽机主控接受负荷指令调节调门开度改变功率；锅炉主控将汽压作被控量调节燃料“跟随”耗汽量变化。优点：机组对负荷响应极快。缺点：锅炉调节迟延导致主汽压在变负荷初期产生剧烈波动。", "difficulty": "困难"}, {"type": "简答题", "id": 210, "chapter": "第十一章", "page": "173", "question": "简述单元机组“机炉协调控制（CCBF）”方式的基本工作原理及优缺点。", "options": {}, "answer": "见解析", "analysis": "原理：机炉同受外部指令，锅炉调燃料适应需求，汽机调调门适应需求并维持汽压。优点：综合了TF和BF优点，既利用汽轮机快速性提高响应速度，又协调锅炉蓄热使主汽压保持相对稳定。", "difficulty": "困难"}, {"type": "简答题", "id": 211, "chapter": "第十一章", "page": "180", "question": "什么是机组的 RUNBACK（RB，辅机故障减负荷）功能？举例说明其动作过程。", "options": {}, "answer": "见解析", "analysis": "概念：当重要辅机跳闸导致最大出力瞬间下降时，自动解除协调将负荷迫降至剩余辅机安全容量的功能。例：单台送风机跳闸时，切除协调，目标负荷强制降为50%，强制关小调门；联锁切除顶层磨煤机，挽救机组免于停机。", "difficulty": "困难"}, {"type": "简答题", "id": 212, "chapter": "第十一章", "page": "185", "question": "简述协调控制系统中“直接能量平衡（DEB）”控制策略的基本物理思想。", "options": {}, "answer": "见解析", "analysis": "思想：利用机组稳态时锅炉输入热量应与汽轮机耗热量相等原理。用“汽轮机调节级压力”与目标负荷对比，直接推算锅炉所需燃料热量指令，强制锅炉提供匹配热量。前馈型控制极大克服燃烧迟延。", "difficulty": "困难"}, {"type": "简答题", "id": 213, "chapter": "第十一章", "page": "188", "question": "简述火电机组负荷控制中，电网“一次调频”和“二次调频（AGC）”的主要区别。", "options": {}, "answer": "见解析", "analysis": "一次调频由汽机DEH自主完成，电网频率波动时极短时间内自发改变调门增减功率抑制波动，是有差调节；二次调频（AGC）是协调系统接受电网下发指令，消除频率稳态偏差并按计划发电，是无差调节。", "difficulty": "困难"}, {"type": "简答题", "id": 220, "chapter": "第十二章", "page": "192", "question": "简述直流锅炉控制系统为什么要引入“中间点温度”（微过热汽温）作为反馈信号。", "options": {}, "answer": "见解析", "analysis": "直流炉过热汽温由燃水比决定。由于受热面极长，出口汽温响应迟延极大。引入蒸发段与过热段交界处具微过热度的“中间点温度”作导前信号，其响应燃水比变化快得多，能提前预见最终汽温趋势，显著提高响应速度和稳定性。", "difficulty": "困难"}, {"type": "简答题", "id": 224, "chapter": "第十三章", "page": "213", "question": "简述循环流化床（CFB）锅炉床温控制的基本方法有哪些。", "options": {}, "answer": "见解析", "analysis": "1)改变给煤量：最直接的调温手段；2)改变一、二次风量配比：一次风改流化和底部燃烧，二次风提供悬浮氧量改床温分布；3)调节返料量或冷渣器控制回料温度以吸收热量。", "difficulty": "中等"}, {"type": "简答题", "id": 229, "chapter": "第十四章", "page": "224", "question": "大型汽轮机的高低压串联旁路系统的主要作用是什么？", "options": {}, "answer": "见解析", "analysis": "1)改善启动性能，加快启动协调启停时间；2)停机甩负荷时旁路排放保护过/再热器不干烧；3)回收工质和热量降低噪音；4)瞬态过程调节限制蒸汽压力防超压。", "difficulty": "中等"}, {"type": "简答题", "id": 234, "chapter": "第十五章", "page": "248", "question": "简述模糊控制策略在火电厂热工自动控制应用中的主要优点。", "options": {}, "answer": "见解析", "analysis": "1)不依赖被控对象精确数学模型，特适合火电厂中非线性、时变大滞后复杂对象；2)具较强鲁棒性对环境干扰适应强；3)规则易懂，能将优秀运行人员专家经验直接融入自动控制中。", "difficulty": "困难"}]};
        
        let questions = [], answers = {}, timer = null, seconds = 0, studentInfo = null, startTime = null;
        
        function show(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function tick() { seconds++; document.getElementById('timer').textContent = String(Math.floor(seconds/60)).padStart(2,'0') + ':' + String(seconds%60).padStart(2,'0'); }
        function updateProg() { const n = Object.keys(answers).length; document.getElementById('progTxt').textContent = n + ' / ' + questions.length; document.getElementById('progBar').style.width = (n/questions.length*100) + '%'; }
        function shuffle(arr) { const a = [...arr]; for(let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; } return a; }
        function randomSelect() { const s = shuffle(QUESTIONS['单选题']).slice(0,4), m = shuffle(QUESTIONS['多选题']).slice(0,3), sh = shuffle(QUESTIONS['简答题']).slice(0,3); const all = [...s,...m,...sh]; all.forEach((q,i) => q.seq = i+1); return all; }
        
        function renderQ() {
            const c = document.getElementById('qList'); c.innerHTML = '';
            questions.forEach(q => {
                const div = document.createElement('div'); div.className = 'q-card'; div.id = 'q-' + q.seq;
                const tc = q.type === '单选题' ? 'type-单选' : q.type === '多选题' ? 'type-多选' : 'type-简答';
                let oh = '';
                if(q.type !== '简答题') {
                    oh = '<div>'; Object.entries(q.options||{}).forEach(([k,v]) => { const inp = q.type === '单选题' ? 'radio' : 'checkbox'; oh += '<div class="opt" data-seq="'+q.seq+'" data-opt="'+k+'"><label><input type="'+inp+'" name="q'+q.seq+'" value="'+k+'"><span class="opt-letter">'+k+'.</span><span>'+v+'</span></label></div>'; }); oh += '</div>';
                } else { oh = '<textarea class="short-input" data-seq="'+q.seq+'" placeholder="请输入答案..."></textarea>'; }
                div.innerHTML = '<div class="q-header"><span><span class="q-type '+tc+'">'+q.type+'</span> <span class="diff-'+q.difficulty+'">'+q.difficulty+'</span></span><span class="text-muted small">第'+q.seq+'题</span></div><div class="q-chapter"><i class="bi bi-book"></i> '+q.chapter+(q.page?'（第'+q.page+'页）':'')+'</div><div class="q-text">'+q.question+'</div>'+oh;
                c.appendChild(div);
            });
            bindOpt();
        }
        
        function bindOpt() {
            document.querySelectorAll('.opt').forEach(o => {
                o.addEventListener('click', function() {
                    const seq = this.dataset.seq, opt = this.dataset.opt, q = questions.find(x => x.seq == seq);
                    if(q.type === '单选题') { document.querySelectorAll('[data-seq="'+seq+'"]').forEach(x => x.classList.remove('sel')); this.classList.add('sel'); this.querySelector('input').checked = true; answers[seq] = opt; }
                    else { this.classList.toggle('sel'); this.querySelector('input').checked = !this.querySelector('input').checked; const sel = []; document.querySelectorAll('[data-seq="'+seq+'"].sel').forEach(x => sel.push(x.dataset.opt)); answers[seq] = sel; }
                    updateProg();
                });
            });
            document.querySelectorAll('.short-input').forEach(t => { t.addEventListener('input', function() { answers[this.dataset.seq] = this.value.trim(); updateProg(); }); });
        }
        
        function calcScore() {
            let total = 0; const res = [];
            questions.forEach(q => {
                const ua = answers[q.seq] || '', ca = q.answer; let ok = false, sc = 0;
                if(q.type === '单选题') { if(String(ua).toUpperCase() === String(ca).toUpperCase()) { ok = true; sc = 10; } }
                else if(q.type === '多选题') { const us = new Set(String(ua).toUpperCase().replace(/[,，\s]/g,'')), cs = new Set(String(ca).toUpperCase().replace(/[,，\s]/g,'')); if(us.size === cs.size && [...us].every(x => cs.has(x))) { ok = true; sc = 10; } }
                else { const ut = String(ua).toLowerCase(), rt = (String(ca)+' '+String(q.analysis||'')).toLowerCase(); const kw = rt.match(/[\u4e00-\u9fa5]{2,}/g)?.slice(0,10) || []; if(kw.length > 0) { const mc = kw.filter(k => ut.includes(k)).length, r = mc/kw.length; if(r >= 0.5) { ok = true; sc = 10; } else if(r >= 0.3) { sc = 5; } } }
                total += sc;
                res.push({ seq: q.seq, type: q.type, question: q.question, options: q.options, user_answer: ua, correct_answer: ca, is_correct: ok, score: sc, analysis: q.analysis, chapter: q.chapter, difficulty: q.difficulty });
            });
            return { totalScore: total, results: res };
        }
        
        function renderRes(results) {
            const c = document.getElementById('resultList'); c.innerHTML = '';
            results.forEach(r => {
                const div = document.createElement('div'); div.className = 'q-card';
                const ic = r.is_correct ? '✓' : (r.score > 0 ? '△' : '✗'), cl = r.is_correct ? 'text-success' : (r.score > 0 ? 'text-warning' : 'text-danger');
                let oh = '';
                if(r.options) { oh = '<div>'; Object.entries(r.options).forEach(([k,v]) => { const us = Array.isArray(r.user_answer) ? r.user_answer.includes(k) : r.user_answer === k; const iso = r.correct_answer.includes(k); let oc = iso ? 'ok' : (us ? 'err' : ''); const mk = iso ? ' ✓' : (us ? ' ✗' : ''); oh += '<div class="opt '+oc+'"><span class="opt-letter">'+k+'.</span><span>'+v+mk+'</span></div>'; }); oh += '</div>'; }
                const ua = Array.isArray(r.user_answer) ? r.user_answer.join('') : r.user_answer;
                const ah = r.type === '简答题' ? '<div class="alert alert-light mt-2"><strong>你的答案：</strong>'+(ua||'未作答')+'<br><strong>参考答案：</strong>'+r.correct_answer+'</div>' : '<p class="mt-2 small"><strong>你的答案：</strong>'+(ua||'未作答')+' &nbsp; <strong>正确答案：</strong>'+r.correct_answer+'</p>';
                div.innerHTML = '<div class="q-header"><span><span class="q-type type-'+(r.type==='单选题'?'单选':r.type==='多选题'?'多选':'简答')+'">'+r.type+'</span> <span class="'+cl+'">'+ic+'</span></span><span class="fw-bold">'+r.score+'/10分</span></div><div class="q-chapter">'+r.chapter+'</div><div class="q-text">'+r.seq+'. '+r.question+'</div>'+oh+ah+'<div class="analysis"><h6><i class="bi bi-lightbulb"></i> 解析</h6><p class="mb-0 small">'+r.analysis+'</p></div><div class="ext"><h6><i class="bi bi-search"></i> 前沿拓展</h6><p class="small mb-0 text-muted">离线版本暂不支持联网拓展功能。</p></div>';
                c.appendChild(div);
            });
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) { e.preventDefault(); const id = document.getElementById('studentId').value.trim(); if(!id) return alert('请输入学号'); if(STUDENTS[id]) { studentInfo = STUDENTS[id]; document.getElementById('sName').textContent = studentInfo.name; document.getElementById('sId').textContent = studentInfo.id; document.getElementById('sMajor').textContent = studentInfo.major; show('readySec'); } else { alert('学号不存在，请检查输入'); } });
        document.getElementById('startBtn').addEventListener('click', function() { questions = randomSelect(); renderQ(); show('examSec'); startTime = new Date(); timer = setInterval(tick, 1000); });
        document.getElementById('submitBtn').addEventListener('click', function() { if(Object.keys(answers).length < questions.length && !confirm('还有题目未作答，确定提交吗？')) return; clearInterval(timer); const { totalScore, results } = calcScore(); document.getElementById('scoreNum').textContent = totalScore; let ok = 0, part = 0, err = 0; results.forEach(r => { if(r.is_correct) ok++; else if(r.score > 0) part++; else err++; }); document.getElementById('okCnt').textContent = ok; document.getElementById('partCnt').textContent = part; document.getElementById('errCnt').textContent = err; document.getElementById('scoreComment').textContent = totalScore >= 90 ? '优秀！继续保持！' : totalScore >= 80 ? '良好，再接再厉！' : totalScore >= 60 ? '及格，需加强学习。' : '不及格，请认真复习。'; const et = new Date(), dur = Math.floor((et - startTime)/1000); document.getElementById('timeInfo').innerHTML = '<i class="bi bi-clock"></i> 用时 ' + Math.floor(dur/60) + '分' + (dur%60) + '秒'; renderRes(results); show('resultSec'); });
        document.getElementById('printBtn').addEventListener('click', function() { window.print(); });
        document.getElementById('restartBtn').addEventListener('click', function() { if(confirm('确定重新开始？')) location.reload(); });
    </script>
